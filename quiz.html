<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231a1714'/><rect x='5' y='20' width='4' height='7' rx='1' fill='%23B4B2A9'/><rect x='11' y='15' width='4' height='12' rx='1' fill='%2397C459'/><rect x='17' y='11' width='4' height='16' rx='1' fill='%23EF9F27'/><rect x='23' y='6' width='4' height='21' rx='1' fill='%23C0392B'/></svg>">
<title>What's Your Level? · Heights of Ignorance</title>
<style>
:root{
 --bg:#14110F; --bg2:#1d1916; --ink:#ECE4D3; --mut:#A89C84; --line:#3a322a;
 --gold:#C6A249; --gold2:#E8CD7C; --card:#211c18;
 --serif:Georgia,"Times New Roman",serif;
 --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
 background-image:radial-gradient(120% 80% at 50% -10%, #271f19 0%, var(--bg) 55%);}
.wrap{max-width:600px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:22px 20px 40px}
.brandbar{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:6px}
.brandbar .bars{display:flex;align-items:flex-end;gap:2px;height:18px}
.brandbar .bars i{width:3.5px;border-radius:1px;display:block}
.brandbar small{color:var(--mut);font-size:11px;letter-spacing:2.5px;text-transform:uppercase}
.screen{flex:1;display:flex;flex-direction:column;justify-content:center;animation:fade .45s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
h1{font-family:var(--serif);font-weight:700;font-size:34px;line-height:1.12;letter-spacing:.3px;color:#fff;margin-bottom:6px}
.sub{color:var(--gold2);font-style:italic;font-family:var(--serif);font-size:17px;margin-bottom:20px}
.hook{font-size:17px;color:#ded4c0;margin-bottom:10px}
.hook b{color:#fff}
.fine{color:var(--mut);font-size:13px;margin:16px 0 22px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);
 color:#1a1410;font-weight:700;border:none;border-radius:12px;padding:15px 22px;font-size:16px;
 cursor:pointer;text-decoration:none;transition:.15s;width:100%}
.btn:hover{background:var(--gold2)}
.btn:active{transform:scale(.985)}
.btn.ghost{background:transparent;color:var(--gold2);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--gold);background:#251f1a}
.btn.sm{padding:11px 16px;font-size:14px;width:auto}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row .btn{flex:1}
.byline{color:var(--mut);font-size:13px;margin-top:18px;text-align:center}
.byline b{color:var(--ink)}
/* progress */
.prog{margin-bottom:24px}
.prog .lab{display:flex;justify-content:space-between;color:var(--mut);font-size:12px;letter-spacing:.5px;margin-bottom:7px;text-transform:uppercase}
.prog .track{height:6px;background:#2a241f;border-radius:6px;overflow:hidden}
.prog .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:6px;transition:width .35s}
/* question */
.qnum{color:var(--gold);font-family:var(--serif);font-size:14px;letter-spacing:1px;margin-bottom:10px}
.qtext{font-family:var(--serif);font-size:24px;line-height:1.32;color:#fff;margin-bottom:26px}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
 border-radius:13px;padding:15px 17px;font-size:16px;color:var(--ink);cursor:pointer;text-align:left;transition:.14s;width:100%}
.opt:hover{border-color:var(--gold);background:#2a231d;transform:translateY(-1px)}
.opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--mut);flex:0 0 auto}
.opt[data-v="2"] .dot{border-color:#D85A30}
.opt[data-v="1"] .dot{border-color:#FAC775}
.opt[data-v="0"] .dot{border-color:#97C459}
.back{background:none;border:none;color:var(--mut);font-size:13px;cursor:pointer;margin-top:20px;align-self:flex-start}
.back:hover{color:var(--ink)}
/* result */
.rkick{color:var(--mut);font-size:13px;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:8px}
.rnum{text-align:center;font-family:var(--serif);font-weight:700;font-size:80px;line-height:1;margin-bottom:2px}
.rname{text-align:center;font-family:var(--serif);font-size:27px;color:#fff;margin-bottom:20px}
.ladder{display:flex;align-items:flex-end;gap:3px;height:66px;margin:0 auto 8px;max-width:330px}
.ladder .seg{flex:1;border-radius:3px 3px 0 0;position:relative;opacity:.32;transition:.3s}
.ladder .seg.on{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.25)}
.ladder .seg .pin{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:13px}
.lcap{display:flex;justify-content:space-between;max-width:330px;margin:0 auto 22px;color:var(--mut);font-size:11px}
.rmean{font-size:16.5px;color:#ded4c0;margin-bottom:18px}
.stepbox{background:linear-gradient(135deg,#241d12,#1c1813);border:1px solid var(--gold);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.stepbox .h{display:flex;align-items:center;gap:8px;color:var(--gold2);font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.stepbox p{font-size:16px;color:#f0e8d8}
.watch{background:#211c18;border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:14px;font-size:14px;color:var(--mut)}
.watch b{color:var(--gold2)}
.reframe{font-family:var(--serif);font-style:italic;font-size:15.5px;color:#cabfa8;text-align:center;margin:18px 4px 22px;line-height:1.5}
.cta{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:18px;margin-bottom:14px}
.cta h3{font-family:var(--serif);font-size:18px;color:#fff;margin-bottom:4px}
.cta p{color:var(--mut);font-size:14px;margin-bottom:13px}
.spk{display:inline-flex;align-items:center;gap:7px;background:none;border:1px solid var(--line);color:var(--gold2);
 border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;margin-bottom:18px}
.spk:hover{border-color:var(--gold)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#2c2620;border:1px solid var(--gold);
 color:var(--gold2);padding:11px 18px;border-radius:24px;font-size:14px;opacity:0;pointer-events:none;transition:.25s}
.toast.show{opacity:1}
@media(max-width:420px){ h1{font-size:29px} .qtext{font-size:21px} .rnum{font-size:64px} }
</style>
</head>
<body>
<div class="wrap">
 <div class="brandbar">
  <div class="bars">
   <i style="height:7px;background:#B4B2A9"></i><i style="height:10px;background:#C0DD97"></i>
   <i style="height:13px;background:#FAC775"></i><i style="height:16px;background:#EF9F27"></i>
   <i style="height:18px;background:#C0392B"></i>
  </div>
  <small>Heights of Ignorance</small>
 </div>
 <div id="app"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var LEVELS=[
 {n:1,name:"Innocent",c:"#D3D1C7",
  t:"On this part of my life, I was simply never taught. I don't know what I don't know.",
  mean:"The blameless not-knowing we are all born with. There is no shame on this level — only an open door.",
  step:"Stay curious. Today, ask one real question about something you have always taken for granted."},
 {n:2,name:"Ignorant",c:"#B4B2A9",
  t:"I could have learned this by now — I just never got around to it.",
  mean:"The gap that time was meant to fill, and didn't. Not blame — just a lesson still waiting for you.",
  step:"Pick the one thing you have avoided learning, and give it ten honest minutes today."},
 {n:3,name:"Less Informed",c:"#C0DD97",
  t:"I know just enough to have strong opinions — but not enough to be sure I'm right.",
  mean:"Half-knowledge: enough to act, not enough to be safe. The most confident place on the whole mountain.",
  step:"Take your strongest opinion and go find the best argument against it — and really listen."},
 {n:4,name:"Foolish",c:"#97C459",
  t:"I know what the wiser choice is… and I keep doing the opposite anyway.",
  mean:"Knowing better, and doing worse. The painful gap between what you know and what you actually do.",
  step:"Choose one thing you know you should stop — and stop it once, today, just to prove you can."},
 {n:5,name:"Adamant",c:"#FAC775",
  t:"When someone corrects me, my first instinct is to defend myself, not to consider it.",
  mean:"The door bolts shut. “I'm right, you're wrong” — quietly protecting what you've already invested in.",
  step:"Next time you're corrected, say three words before anything else: “I might be wrong.”"},
 {n:6,name:"Madness",c:"#EF9F27",
  t:"I've stopped noticing how much this is costing me. It just feels normal now.",
  mean:"Still suffering — but gone numb to the pain. The deepest blindness is the one that has started to feel normal.",
  step:"Let yourself feel one true thing today. Name what this is really costing you, out loud."},
 {n:7,name:"Arrogant",c:"#D85A30",
  t:"Lately I explain more than I ask — and the people around me have gone quiet.",
  mean:"Ignorance turned outward, pushing your view onto others. It feels like strength; underneath, it's the fear of being questioned.",
  step:"Ask one person one real question today — and stay quiet long enough to truly hear the answer."},
 {n:8,name:"Demoniac",c:"#C0392B",
  t:"I sometimes use my power — at home or at work — to make people comply, not to serve them.",
  mean:"Ignorance armed with power: obey, or be punished. Not only tyrants — also the cruel boss and the controlling home.",
  step:"Find one place you use power to silence, and choose to serve there instead. Let someone disagree, safely."},
 {n:9,name:"Total Destruction",c:"#9b2d22",
  t:"Something in my world is sliding toward a breakdown, and no one is stopping it.",
  mean:"The summit is a grave. Nobody chooses it — it's simply what happens when no step down was ever taken. And every level below it had a door marked DOWN.",
  step:"It is not too late. Name the one thing heading for ruin, and take the smallest possible step back from the edge — today."}
];
var AWAKE={n:0,name:"Awake at the Foot",c:"#C6A249",
 mean:"You answered honestly and nothing pulled you upward — and that is rare. Either you are walking unusually awake, or one honest answer is still waiting for you. Either way, keep this clarity close.",
 step:"Read the nine levels slowly, once more. The moment one of them stings a little — that is your growth edge."};

var KIT="https://ffgm.kit.com/44df2b86f7";
var app=document.getElementById('app'), toast=document.getElementById('toast');
var answers=new Array(9), qi=0;

function esc(s){return s;}
function setApp(html){ app.innerHTML='<div class="screen">'+html+'</div>'; }

function intro(){
 stopSpeak(); answers=new Array(9); qi=0;
 setApp(
  '<h1>What’s your level?</h1>'+
  '<div class="sub">A 90-second self-check.</div>'+
  '<button class="spk" onclick="speak(HOOK)"><span>🔊</span> Listen</button>'+
  '<p class="hook">Most of our suffering isn’t bad luck, and it isn’t bad people. <b>It’s a level of ignorance we haven’t named yet.</b></p>'+
  '<p class="hook">There are nine of them. We’re each standing on one right now — and naming it is how we leave it.</p>'+
  '<p class="fine">No sign-up. Nothing saved. Just you, being honest, for ninety seconds.</p>'+
  '<button class="btn" onclick="start()">Begin →</button>'+
  '<div class="byline">From the book <b>Heights of Ignorance</b> by Omjai Venkat</div>'
 );
}
var HOOK="Most of our suffering isn't bad luck, and it isn't bad people. It's a level of ignorance we haven't named yet. There are nine of them. We're each standing on one right now, and naming it is how we leave it.";

function start(){ qi=0; question(); }

function question(){
 stopSpeak();
 var L=LEVELS[qi];
 var pct=Math.round((qi)/9*100);
 setApp(
  '<div class="prog"><div class="lab"><span>Question '+(qi+1)+' of 9</span><span>'+Math.round((qi+1)/9*100)+'%</span></div>'+
   '<div class="track"><div class="fill" style="width:'+Math.round((qi+1)/9*100)+'%"></div></div></div>'+
  '<div class="qnum">When you read this, is it you?</div>'+
  '<div class="qtext">“'+L.t+'”</div>'+
  '<div class="opts">'+
   '<button class="opt" data-v="2" onclick="answer(2)"><span class="dot"></span>Yes, that’s me</button>'+
   '<button class="opt" data-v="1" onclick="answer(1)"><span class="dot"></span>Sometimes</button>'+
   '<button class="opt" data-v="0" onclick="answer(0)"><span class="dot"></span>Not really</button>'+
  '</div>'+
  (qi>0?'<button class="back" onclick="goBack()">← back</button>':'')
 );
}
function answer(v){ answers[qi]=v; if(qi<8){ qi++; question(); } else { result(); } }
function goBack(){ if(qi>0){ qi--; question(); } }

function result(){
 stopSpeak();
 var top=0;
 for(var i=8;i>=0;i--){ if(answers[i]===2){ top=i+1; break; } }
 if(top===0){ for(var i=8;i>=0;i--){ if(answers[i]===1){ top=i+1; break; } } }
 var watch=0;
 for(var j=8;j>=0;j--){ if(answers[j]>=1 && (j+1)>top){ watch=j+1; break; } }
 var L = top===0 ? AWAKE : LEVELS[top-1];

 var ladder='<div class="ladder">';
 for(var k=0;k<9;k++){
  var h=22+k*5; var on=(top===k+1);
  ladder+='<div class="seg'+(on?' on':'')+'" style="height:'+h+'px;background:'+LEVELS[k].c+'">'+(on?'<span class="pin">📍</span>':'')+'</div>';
 }
 ladder+='</div><div class="lcap"><span>1 · Innocent</span><span>9 · Destruction</span></div>';

 var watchHtml = watch ? '<div class="watch">You also recognised a flicker of <b>Level '+watch+' · '+LEVELS[watch-1].name+'</b>. Worth keeping an eye on.</div>' : '';

 var readText = (top===0?"Your result: awake at the foot of the mountain. ":"Your level right now is level "+L.n+", "+L.name+". ")+L.mean+" Your one step down: "+L.step;

 setApp(
  '<div class="rkick">'+(top===0?'Your result':'Your level right now')+'</div>'+
  (top===0?'<div class="rnum" style="font-size:46px;color:'+L.c+'">✨</div>':'<div class="rnum" style="color:'+L.c+'">'+L.n+'</div>')+
  '<div class="rname">'+L.name+'</div>'+
  ladder+
  '<button class="spk" onclick=\'speak(RT)\'><span>🔊</span> Listen to your result</button>'+
  '<p class="rmean">'+L.mean+'</p>'+
  watchHtml+
  '<div class="stepbox"><div class="h"><span>↓</span> Your one step down</div><p>'+L.step+'</p></div>'+
  '<p class="reframe">This isn’t a verdict on your worth. It’s only your growth edge — the highest habit you were honest about. Name your level, and you can leave it.</p>'+
  '<div class="cta"><h3>Be first to climb down</h3><p>The book and the free climb-down guides are on the way. Join the list and you’ll be the first to get them.</p>'+
   '<a class="btn" href="'+KIT+'" target="_blank" rel="noopener">Join the free list →</a></div>'+
  '<div class="row"><button class="btn ghost" onclick="share()">🔗 Share your level</button>'+
   '<button class="btn ghost" onclick="intro()">↺ Take it again</button></div>'+
  '<div class="byline">From <b>Heights of Ignorance</b> · Omjai Venkat</div>'
 );
 window.RT=readText;
}

/* ===== share ===== */
function share(){
 var top=0; for(var i=8;i>=0;i--){ if(answers[i]===2){top=i+1;break;} }
 if(top===0){ for(var i=8;i>=0;i--){ if(answers[i]===1){top=i+1;break;} } }
 var nm = top===0?"awake at the foot of the mountain":("Level "+top+" — "+LEVELS[top-1].name);
 var url = (location.protocol.indexOf('http')===0)?location.href:'';
 var msg = "I just found my level on the Heights of Ignorance self-check: "+nm+". Where do you stand?"+(url?" "+url:"");
 if(navigator.share){ navigator.share({title:"What's your level?",text:msg,url:url||undefined}).catch(function(){}); }
 else { copy(msg); }
}
function copy(t){
 try{ navigator.clipboard.writeText(t).then(function(){popToast("Copied — paste it anywhere");},function(){popToast("Press and hold to copy");}); }
 catch(e){ popToast("Copy not available here"); }
}
function popToast(m){ toast.textContent=m; toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},2200); }

/* ===== text-to-speech (with the keep-alive fix) ===== */
var synth=window.speechSynthesis, speaking=false;
function chunks(t){
 var parts=t.match(/[^.!?]+[.!?]+|\S[^.!?]*$/g)||[t], out=[];
 parts.forEach(function(p){ p=p.trim(); if(!p)return;
  if(p.length<=180){ out.push(p); return; }
  var w=p.split(/\s+/), cur=''; w.forEach(function(x){ if((cur+' '+x).length>180){ if(cur)out.push(cur); cur=x; } else cur=cur?cur+' '+x:x; }); if(cur)out.push(cur);
 });
 return out.length?out:[t];
}
function speak(text){
 if(!synth){ popToast("Read-aloud not supported here"); return; }
 synth.cancel(); var cs=chunks(text), i=0; speaking=true;
 (function go(k){ if(k>=cs.length){ speaking=false; return; }
   var u=new SpeechSynthesisUtterance(cs[k]); u.rate=1; u.lang='en-GB';
   u.onend=function(){ if(speaking && !synth.paused) go(k+1); };
   u.onerror=function(){ if(speaking) go(k+1); };
   synth.speak(u);
 })(0);
}
function stopSpeak(){ try{ speaking=false; if(synth) synth.cancel(); }catch(e){} }
setInterval(function(){ try{ if(speaking && synth.speaking && !synth.paused){ synth.pause(); synth.resume(); } }catch(e){} },9000);

intro();
</script>
</body>
</html>
