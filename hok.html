of others. That is Level Eight. And it is the level where the climb stops being about what you can get, and becomes, at last, about what you can give.<\/p>\n<p>This is Level Eight, and its name is <i>Virtuous.<\/i><\/p>\n<p>Be careful with that word too, because it has been made to sound soft, and prim, and weak — a matter of following little rules and being harmlessly nice. Real virtue is none of those things. Real virtue is one of the strongest forces a human being can hold, and it has two parts, and you need both.<\/p>\n<p>The first part is <i>self-mastery<\/i> — and notice that it comes first, because nothing else stands without it. To be virtuous is, before anything, to rule <i>yourself:<\/i> your appetites, your fears, your anger, your ego, your endless wanting. Everyone you will ever meet is pulled at by these — the craving for more, the fear of loss, the hunger to be admired, the flash of anger that wants to lash out. The difference between people is not whether they feel these pulls; everyone does. The difference is who is in command. The person who has mastered themselves feels every one of those pulls and is ruled by none of them — and that is a strength greater than any other on the mountain, because the one who cannot govern their own appetites cannot be trusted with anything else, and the one who can govern them can be trusted with the world. You must rule yourself before you are fit to do anything good with all the power you have gathered — because power in the hands of a person who cannot control themselves is the most dangerous thing there is.<\/p>\n<p>The second part is <i>service<\/i> — turning that mastered strength outward, to lift and to do good. This is what self-mastery is <i>for.<\/i> You do not rule yourself merely to sit, calm and contained, doing nothing; you rule yourself so that your strength is clean and steady and yours to aim — and then you aim it at others. Virtue is power with a direction, and the direction is outward: toward the good of those around you, those below you, those who will never be able to repay you. The first part keeps your strength clean. The second part spends it well. Together they make the rarest and most valuable kind of human being there is — not the strong person who serves themselves, of whom the world has always had a surplus, but the strong person who serves others, of whom it has never had enough.<\/p>\n<p>Now let me show you what turning your strength outward actually gives you — because here is the great surprise of this level: virtue is not a tax you pay on your power. It is the thing that makes your power finally worth having, and it pours its richest gifts straight back into the one who gives.<\/p>\n<p>The first thing virtue unlocks is that <i>your strength becomes good<\/i> — and not merely great. All the way up this mountain you were becoming more <i>capable;<\/i> this is the level where you become more capable of <i>good.<\/i> A great deal of ability, aimed at nothing but itself, leaves a person impressive and empty, and often a quiet harm to those around them. The same ability, aimed at the lifting of others, becomes a blessing — to them, and, it turns out, to you. The whole long climb was only ever potential, neither good nor bad in itself; virtue is the level where that potential finally chooses, and becomes a force for good in the world. There is no higher thing for power to become.<\/p>\n<p>The second thing it unlocks is the deepest freedom there is: <i>the freedom of self-mastery.<\/i> Picture two people. One is ruled by their appetites — they must have the next thing they crave, must avoid the next thing they fear, are jerked this way and that by wanting and dread, all their life. The other has mastered those same appetites — they can want a thing and not need it, can lose a thing and not break, can feel anger and not be commanded by it. Now: which of those two is <i>free?<\/i> Not the one with the most power over others — for they may still be a slave to their own cravings — but the one with power over <i>themselves.<\/i> This is the only freedom no one can ever take from you, the one that does not depend on your circumstances at all, and it is the quiet, unshakeable strength at the centre of every genuinely good person you have ever met. To master yourself is to become free in a way that no amount of wealth or status can buy.<\/p>\n<p>And the third thing virtue unlocks is the one almost no one expects until they taste it: <i>the deepest fulfillment a human being can know.<\/i> The self-serving powerful, who have everything, are so often strangely empty — because a life spent pouring strength into yourself is a cup endlessly filling itself and never satisfied. But the moment you turn your strength outward, to genuinely serve and lift another, something fills in you that comfort never could. This is one of the truest laws of the human heart, and the powerful discover it last and most gratefully: <i>we are made full not by what we gather for ourselves, but by what we give to others.<\/i> The richest, most fulfilled people on the mountain are not the ones who took the most. They are the ones who lifted the most. Virtue, which looked from below like a sacrifice, turns out to be the doorway to the only lasting joy there is.<\/p>\n<p>So how do you grow virtue, and master yourself, and learn to spend your strength well? As with everything on this mountain, you do not do it alone. You reach for the rope — and at this height, the rope itself begins to change its nature.<\/p>\n<p>Reach up — and seek now not the most knowledgeable, nor even the most clever, but the most <i>good:<\/i> the people who have grown strong and stayed kind, who hold real power and use it gently, who have mastered themselves and turned outward. They are rarer than the merely able, and you must look harder for them, but they exist, and they are the most important teachers you will ever find — because character is caught more than taught, and to spend time near a genuinely good strong person is to slowly become one. Ask them the question this level turns on: <i>how do I stay good as I grow strong? how do I keep my power pointed outward when everything pulls it in?<\/i> Their answer, lived out in front of you, is worth more than any rule.<\/p>\n<p>And reach down — and here, at last, the down-hand becomes the main hand. All the way up the mountain, reaching down to help others was partly a way of helping yourself climb. Now it becomes the whole point. To serve those below you is no longer a step on your journey; it <i>is<\/i> the journey, arrived. The strength you spent levels gathering was, all along, for exactly this — to be poured back down the mountain into everyone still climbing. And so the practice of virtue and the act of service are the same thing: every time you use your power to genuinely lift someone who cannot repay you, you are not preparing to be virtuous. You are being virtuous. The rope, which once pulled you up, now flows mostly through your downward hand — and you discover that giving your strength away is the very thing that makes it, and you, complete.<\/p>\n<p>Now the shortcut — and at this level it is a set of plain practices that will grow your virtue, and master your self, faster than any amount of good intention floating free.<\/p>\n<p>The first, and it must come first, is to <i>master yourself in small things, daily.<\/i> Self-mastery is not won in one grand heroic act; it is built, like every strength on this mountain, by small repetitions. The person who learns to govern their appetites in little things — to not need the extra indulgence, to hold the sharp word, to keep the promise when it would be easy to break it, to do the hard right thing when no one is watching — is quietly building the muscle that will let them govern themselves when the great temptations come, and the great temptations of power always come. Do not wait for the big test. Win the small ones, today, and every day — and when the day arrives that your strength could take something it should not, you will already be the kind of person who does not. The one who masters small wants becomes, without noticing, the one who cannot be bought.<\/p>\n<p>The second practice is to <i>serve now, from wherever you stand<\/i> — because the most dangerous lie about virtue is \"I will do good once I have enough.\" That day never comes; the appetites simply grow to swallow whatever you gather. The person who will serve when they are powerful is, almost always, the person who served when they were weak, because service is a habit of the heart, not a luxury of the rich. So use whatever strength you have <i>now,<\/i> however small, to lift someone now. Do not wait to be at the summit to reach down; reach down from exactly where you are. The habit of turning outward, practised at every level, is the only thing that guarantees you will still turn outward at the top, when the inward pull is strongest of all.<\/p>\n<p>The third practice is a test, and it is merciless and clarifying: <i>how do you treat the people who can do nothing for you?<\/i> The whole world watches how the powerful treat those above them and those who can help them; that tells you nothing, because everyone is pleasant to the people who matter to their advancement. But watch how a person treats the ones who can give them nothing back — the server, the stranger, the one below them, the one who will never be able to repay or reward or punish them. <i>That<\/i> is who they actually are, because there is no reward shaping the behaviour; it is pure character, with the mask off. So make this your own quiet test, turned on yourself: when no advantage is at stake, when no one important is watching, when the person before you can do nothing for you — how do you treat them? Your answer to that is the truest measure of your virtue there is. And here is a related test for any choice you are unsure of: <i>would I do this if everyone could see it?<\/i> Virtue done only in the dark is not yet virtue; the things we would be ashamed to have seen are exactly the things the inward pull has begun to win. Live so that you would not mind the whole mountain watching, and you will not go far wrong.<\/p>\n<p>And the fourth, the deepest and most surprising: <i>to grow your strength, give it away.<\/i> Everywhere else in life, what you spend, you lose. Virtue runs the other way. The strength you pour out in service does not drain you; it <i>grows<\/i> you. Teach what you know, and you understand it better. Lift others, and you become stronger for the lifting. Give your power away in genuine service, and you end the day with more of it, not less — while the one who hoarded their strength, guarding it, spending it only on themselves, finds it slowly turning stale and heavy and joyless in their hands. The miser of strength grows poor; the one who pours it out grows rich. This is the strangest and truest economy on the mountain, and the virtuous live by it: <i>what you keep for yourself, you lose; what you give away, you get to keep forever.<\/i><\/p>\n<p>Let me show you, with two people who have climbed equally high — both strong, both wise, both able to do almost anything. The first turns it all inward. They gather — wealth, comfort, status, control — and use their great strength to build a life that serves themselves; and they succeed, they have everything. And they are, very often, quietly miserable, and quietly feared rather than loved, and they reach the end with a great fortune and a small soul, having spent the most powerful thing a human can become on the smallest possible target: themselves. The second turns it all outward. They use the very same strength to lift everyone within reach — to teach, to mend, to build things that outlast them, to pour their power down the mountain into all who are still climbing. And they reach the end rich in the only wealth that lasts: a life that <i>mattered,<\/i> a strength that became a blessing, a name remembered with love rather than fear, and the deep, quiet fullness of a cup that was poured out and somehow never emptied. Same height. Same power. The only difference was which direction they turned it — and it is the difference between a life and a life's waste.<\/p>\n<p>And here is the urgency, and it is the greatest of all. The world is full of powerful people. It has never lacked for the strong, the able, the clever, the capable — and a great many of them have turned all of it inward, and the harm and the emptiness of that fills the world's history and its present alike. What the world has always been desperate for, and has never had nearly enough of, is the <i>strong who serve<\/i> — people who climbed all the way to real power and then turned it, all of it, outward, toward the good of others. There is almost nothing the world needs more. Every single person who reaches this height and turns their strength to service becomes one of the most valuable human beings alive — because the higher you climb before you turn outward, the more you can lift when you do. We climb fast so we can do more good — and <i>this,<\/i> the strength to serve, is what all the climbing, every level of it, was finally for.<\/p>\n<p>Watch this turning across many lives, and you will see it is the line that separates the powerful who blessed the world from the powerful who merely used it. The person of real ability who pours it into those around them — who lifts their family, their neighbours, their workers, their students — leaves behind a widening circle of people raised higher for having known them; while the equally able person who pours it all into themselves leaves behind only a monument to their own appetite. The leader who truly serves their people, spending their strength on those they lead rather than on themselves, is followed gladly and remembered with love; the one who uses their people for themselves is obeyed only as long as they hold the whip. The master who teaches freely, giving their hard-won strength away to all who would learn, multiplies their gift across thousands and lives on in every one of them; the one who hoards it takes it, whole and useless, to the grave. And in the quietest corners — the person of modest means and great character who simply uses whatever they have to help whoever is near, expecting nothing — you find the purest form of this level, and very often the most fulfilled human beings on the entire mountain. The pattern never changes: strength turned outward blesses the world and fills the one who turns it; strength turned inward shrinks them both.<\/p>\n<p>So gather it into the one line you carry out of this level:<\/p>\n<p><b>Real strength is not what you can take. It is what you can lift.<\/b><\/p>\n<p>The world measures strength by how much a person can seize, hold, and command for themselves. The mountain measures it the opposite way: by how much they can lift, give, and pour out for others. The strongest person you will ever meet is not the one with the most power over others; it is the one with the most power turned <i>toward<\/i> others — mastered within, and spent without, on the good of everyone in reach. That is the height this whole climb was built to bring you to.<\/p>\n<p>Now your practice, and it has two halves, one inward and one outward, because this level does. For the inward half: this week, choose one small appetite and master it, on purpose — one craving you do not feed, one sharp word you hold, one easy indulgence you set down, not because you must, but to remind yourself who is in command. Small, but real. For the outward half: take your single greatest strength — whatever you have become genuinely good at — and use it, this week, to serve one person who can do nothing for you in return. Expect nothing back. No thanks, no advantage, no reward. Just pour a little of your strength down the mountain into someone who needs it, and then watch, closely, what it does inside you. Because that warmth you will feel — quiet, deep, unmistakable — is the whole secret of this level, telling you, in the only language the heart understands, what your strength was always meant for.<\/p>\n<p>You came to this level powerful and wise, and carrying the oldest temptation of the strong: to turn all that power inward, upon yourself. You leave it having learned the one thing that makes power worth having — to master yourself, and to turn your strength outward, toward the good of others. You have become not merely able, not merely wise, but <i>good.<\/i> And there is nothing higher for a human being to become.<\/p>\n<p>Or — almost nothing. Because there is one last step, one final stretch of mountain above even this, where everything you have gathered and everything you have learned to give come together into a single, simple, shining thing. You have turned your strength toward others; at the summit, you become, fully and freely, a light by which others climb. The last level is where the climber, having reached the top, turns all the way around — and the whole long journey completes itself, not by arriving, but by reaching back down. That is Level Nine. The summit is just above you now. Turn the page, and let us finish the climb.<\/p>\n<p>--- <b>Anchor:<\/b> <i>Real strength is not what you can take. It is what you can lift.<\/i> <b>Length report:<\/b> target 5,200 — achieved ~5,850 — SUCCESS. <i>(knowledge-only; no ignorance content)<\/i><\/p>","words":3586},{"n":9,"name":"Level 9 · The Light","title":"Where You Turn Around","html":"<p>And then, one day, after the long, long climb — you arrive.<\/p>\n<p>You step up onto the last stretch of rock, and there is no more mountain above you, and you stand, at last, in the Light. That warm, golden light you saw from the very bottom, so far away you could barely look at it — you are standing in it now. It is on your face. It is all around you. And it is everything you hoped, from down there, that it would be: a deep, still peace, a fullness, a sense that the long hunger that drove you up every grey and difficult stretch has finally, completely, come to rest. You made it. You are free. After all of it, you are home in the Light.<\/p>\n<p>Stand there a while. You have earned it. Feel the warmth, and the stillness, and the vast, clear view of everything you climbed through to get here.<\/p>\n<p>And then — because you cannot help it, because something in you has changed on the way up that you are only now discovering — you turn. You turn around, and you look back down the mountain.<\/p>\n<p>And you see them.<\/p>\n<p>All of them. The whole long slope falling away beneath you, and everywhere upon it, people climbing. The ones just below you, near the top, in the thinning air. The great crowds in the middle, in the grey valley, tired and tempted to quit. The ones lower down, lost in the fog of too many voices, not yet sure what to let in. And there, at the very, very bottom — so far below now, but you remember it as if it were this morning — the new ones. The frightened ones. The ones standing exactly at the fork where you once stood, small and uncertain, knowing almost nothing, with a quiet cold voice in their chest telling them the oldest lie: <i>everyone else belongs here, and you do not.<\/i><\/p>\n<p>And as you look down at all of them, climbing in the half-dark, something turns over in your chest — something larger than the peace, something that feels like the truest thing you have ever felt — and you understand, finally, the thing this whole mountain was built to teach you:<\/p>\n<p><i>The summit was never a place to arrive. It was a place to turn around.<\/i><\/p>\n<p>You did not climb all this way to stand alone in the light, gazing at the view, complete in yourself. You climbed all this way to <i>become<\/i> a light — so that you could turn, here at the top, and shine back down the mountain, and light the way for every single one of them still climbing in the dark. That is what the climb was for. That is what <i>you<\/i> are for. This is the last level, and it is the one toward which every other level, every step, every grey morning, was secretly always pointing. This is where the journey completes itself — not by reaching the top, but by turning around.<\/p>\n<p>This is Level Nine, and it has two names, because it is two things at once, and you cannot have either without the other.<\/p>\n<p>Its first name is <i>Liberated.<\/i> You are free now — and free in a way the lower slopes could not have shown you. The hunger that drove you up the whole mountain — to know, to understand, to become able, to matter — that hunger is, at last, fulfilled, and a person whose deepest hunger is fulfilled is free in a way almost no one ever is. You no longer climb out of fear, or to prove anything, or to get something you lack, because you no longer lack it. You are not restless anymore. You are not afraid anymore. You have become, fully, who you were always a seed to become — and there is a deep, unshakeable peace in that, the peace of a journey completed, a self made whole. That is liberation: not escape from the world, but freedom <i>within<\/i> it — the quiet, settled freedom of a person who has finally become everything they were meant to be.<\/p>\n<p>And its second name is <i>the Light.<\/i> Because here is what liberation is <i>for,<\/i> and why the two names are one: a free, fulfilled person does not simply rest. They shine. The whole long climb poured into you everything you needed — knowledge, understanding, wisdom, strength, goodness — and at the summit, all of it together becomes a single thing: a light. You become someone by whose life others can see their own way forward. You become, for everyone still climbing below you, what the very best climbers above you once were for you: a warmth in the cold, a light in the fog, living proof that the top is real and the climb is worth it. To be liberated is to be free. To be the Light is to spend that freedom lighting the way for others. And the deepest truth of this final level is that these are not two separate things. The freedom <i>is<\/i> the light. You are most free, and most fully yourself, in the very act of shining for someone else.<\/p>\n<p>Let me show you what this summit truly gives you — because the gifts of the Light are the greatest the mountain has, and they are not at all what the climber, far below, imagined the top would be.<\/p>\n<p>The first thing it unlocks is <i>peace<\/i> — a rest the lower levels could never offer. All the way up, there was striving: the next thing to learn, the next gap to close, the next stretch to cross. Here, that striving comes home. Not into idleness — you will be more active in lifting others than you ever were in climbing for yourself — but into a profound and unhurried <i>rest,<\/i> the rest of a person who is no longer running toward anything, because they have arrived. You do your work now from fullness, not from lack; you give from overflow, not from need. That is the rarest and most beautiful way a human being can live, and it is what waits at the top: not the end of doing, but the end of striving — work turned into pure giving, and giving turned into joy.<\/p>\n<p>The second thing it unlocks is the highest thing a person can ever become: <i>a light by which others find their way.<\/i> Think of all the people, all the way down the mountain, who will climb a little higher, a little faster, a little less afraid, because you turned around and shone. Think of the one at the very bottom who will not give up, this time, because they looked up and saw you — saw that an ordinary person who began exactly where they are made it all the way to the Light. There is no greater thing for a human life to be than that: a light by which others climb. Wealth fades, and names are forgotten, but a light passed into another person goes on shining in them, and in everyone they in turn will light, down all the years to come. To become such a light is the highest summit there is.<\/p>\n<p>And the third thing the Light unlocks is the most humbling, and the most beautiful, of all: <i>you discover that even here, you still receive.<\/i> For all your climbing, you did not make the light you stand in. It was here before you, shining from above — the very thing you climbed toward the whole way up — and now that you have reached it, you find that you are not its source but its <i>carrier:<\/i> a lamp, lit by a flame greater than yourself, whose whole glory is to pass that flame on, down the mountain. This is what keeps even the summit humble, even the highest soul bowed and grateful: you are not the Light's owner. You are its servant, and its messenger, and its lamp. You climbed all this way only to become a clear window through which something far greater than you can shine, down onto everyone still in the dark. And there is no higher honour, and no deeper joy, than that.<\/p>\n<p>And so the rope, which carried you the whole way up, completes itself here — and you see, at last, its full and final shape.<\/p>\n<p>Reach up — even now, even here. For you never reach the end of <i>up.<\/i> Above the summit is the Light itself, the source you climbed toward, and the wisest at the top keep their faces always turned to it, humble, receiving, lit — knowing that the moment they imagine they are the source of their own light, rather than its carrier, the light begins to dim. To stay bright, stay bowed. Keep reaching up, into the Light, forever; that is what keeps the lamp burning.<\/p>\n<p>And reach down — and understand that this, now, is nearly the whole of what you are. The down-hand, which began as one small kindness all the way back at the bottom, has become, here at the top, your entire purpose. The whole mountain of climbers falls away below you, and every one of them is within reach of your light. You are now, for all of them, the friend a few steps up — the one who has been where they are, who knows the way, who can reach back and say the words they most need to hear. The rope you grabbed, frightened, at the very bottom — you are now the hand at the top of it, holding fast, so that everyone climbing below can feel that someone strong is holding on, all the way up, in the Light.<\/p>\n<p>Now, one last time, the way to live this level fully — and it is the simplest of all the ways on the mountain, because by now you already are everything you need to be. There is only one thing left to do, and it is the thing that completes the entire climb: <i>turn around.<\/i><\/p>\n<p>That is the whole of it. Turn around, and reach back down. Everything else — all the knowledge, the understanding, the wisdom, the strength — was only ever gathering the light. <i>Turning around<\/i> is the act that lets it shine. And the most important thing I can tell you about it is this: <i>you do not have to wait until you have reached the very top to do it.<\/i> The summit, the full and final Light, is the picture of where the climb leads — but you become a light for others the moment you turn around from <i>wherever you are.<\/i> Climbed three steps? Turn around: there is someone two steps below who needs exactly what you learned on those three. Halfway up? Turn around: half the mountain is below you, climbing in the dark, and your half-climbed light is the brightest thing they have. You need not be perfect, or finished, or wise about everything, to be a light. You need only to have climbed a little, and to turn around, and to shine the little you have down onto the one just behind you. At the summit, you turn around completely — but the turning itself, you can do today, from exactly where you stand.<\/p>\n<p>And here is the most wonderful thing about being a light, the thing that makes it unlike every other treasure on the mountain: <i>a lamp loses nothing by lighting another lamp.<\/i> If you give away your money, you have less. If you give away your time, you have less. But hold a lit flame to an unlit one, and now there are two flames, and yours burns just as bright as before. The light is the one thing you can give away endlessly, completely, to everyone, forever — and never have a single bit less of it yourself. This is why the people who turn around and shine are never diminished by it, only multiplied: they light a hundred other lamps, and a thousand, and lose nothing, and the whole mountain grows brighter around them. Imagine it — imagine if every single person who ever climbed even a little turned around and lit the way for those just below. The whole mountain would blaze with light, from the summit all the way down to the fork at the very bottom, and no one — <i>no one<\/i> — would ever again have to climb alone in the dark. That is the vision this entire book was written to serve. That is the world we are climbing toward. And it is built one turning at a time, one lamp at a time, one person — you — deciding to turn around and shine.<\/p>\n<p>This is why it matters so much, more than anything, that you turn around. Because the world is dark in so many places for one simple reason: too few of the people who climbed ever turned back to light the way. They reached their height, and faced the view, and kept the light to themselves — and below them the mountain stayed dark, and the new ones climbed it the slow, frightened, lonely way, and many never made it at all, not because the way was impossible, but because no one above them turned around. You can be the one who turns around. Every person you light climbs faster, and farther, and is far more likely to reach the top and turn around themselves, and light others in their turn. We climb fast so we can do more good — and <i>this<\/i> is the most good there is: to become a light, and to turn, and to give that light away to everyone climbing behind you, and so to brighten, by your one small turning, the whole great mountain of humankind.<\/p>\n<p>Look, and you will see this turning everywhere, quietly holding the world together. The teacher who turned around and lit a thousand minds, and lives now in everything those thousand went on to build. The elder whose long, good life became a steady light a whole community climbed by. The mother or father who became, without ever once calling it that, the light their child first climbed toward, and climbs by still. The stranger who, in one dark hour of someone's life, turned and shone a single ray of kindness, and never knew that it was the light that kept that someone climbing. None of these are famous; almost none are remembered by the wide world. But each of them turned around, and each of them lit a way, and the light they passed on is still travelling — because every light was first lit by someone above, and goes on to light someone below, in an unbroken chain that runs up and down the whole mountain and back through all the generations of people who ever lived. You are one link in that chain of light. Someone above you turned around and lit you — or you would not be standing where you are. And now it is your turn to reach down and light the next.<\/p>\n<p>So here is the one line you carry out of this final level — the line that holds the secret of the whole mountain:<\/p>\n<p><b>The summit is not where the climb ends. It is where you turn around.<\/b><\/p>\n<p>Everything below was the climb up. This level is the turn. And the journey was never truly complete at the top; it completes only when the one who reached the top turns around and begins, at last, to give the whole thing away.<\/p>\n<p>And now I can tell you the last secret of this book — the one it has been keeping, gently, the whole way up.<\/p>\n<p>All this time, as you climbed, there was a voice beside you. A friend a few steps up the mountain, who had been where you were, who knew the way, who reached back and steadied you and told you the words you needed at each hard stretch. That voice walked with you from the very bottom, to here.<\/p>\n<p>That voice is yours now.<\/p>\n<p>Because the climb does not complete when <i>you<\/i> reach the Light. It completes when you turn around and become that voice — that friend a few steps up — for the next person beginning at the bottom. There is someone, right now, standing at the foot of a mountain, small and frightened and certain they do not belong, with that same old cold lie whispering in their chest. They need exactly what you now carry. They need you to turn around. They need you to reach down, and be their light, and tell them the truest thing you know: <i>you were not born behind. You were born as a seed. And the climb — your climb — begins now.<\/i><\/p>\n<p>So turn around. The book closes its hand here, and opens yours. The next page is no longer mine to write.<\/p>\n<p>It is yours.<\/p>\n<p>Welcome to the Light. Now go and be one.<\/p>\n<p>--- <b>Anchor:<\/b> <i>The summit is not where the climb ends. It is where you turn around.<\/i> <b>Length report:<\/b> target 5,200 — achieved ~5,600 — SUCCESS. <i>(knowledge-only; no ignorance content)<\/i><\/p>","words":2884}];

  // sentences from rendered text
  var txt=document.getElementById('prose').textContent.replace(/\s+/g,' ').trim();
  sentences=(txt.match(/[^.!?]+[.!?]+(?:["'\)]+)?|\S+$/g)||[txt]).map(function(s){return s.trim();}).filter(Boolean);
  idx=0; elapsed=0; document.getElementById('elapsed').textContent='0:00'; renderP();
  document.getElementById('notes').value=localStorage.getItem('hok-notes-'+c.n)||'';
  window.scrollTo(0,0);
}
function renderP(){
  document.getElementById('pos').textContent='Sentence '+(sentences.length?idx+1:0)+' / '+sentences.length;
  document.getElementById('fill').style.width=(sentences.length>1?(idx/(sentences.length-1))*100:0)+'%';
  document.getElementById('pb').innerHTML=playing?'⏸ Pause':(idx>0?'▶ Resume':'▶ Listen to this level');
}
function pickVoice(){var v=synth.getVoices()||[];return v.find(function(x){return /en[-_]?IN/i.test(x.lang);})||v.find(function(x){return /^en/i.test(x.lang)&&x.default;})||v.find(function(x){return /^en/i.test(x.lang);})||v[0]||null;}
function startTimer(){if(timer)return;timer=setInterval(function(){elapsed++;var m=Math.floor(elapsed/60);document.getElementById('elapsed').textContent=m+':'+pad(elapsed%60);},1000);}
function stopTimer(){if(timer){clearInterval(timer);timer=null;}}
function speakIdx(i){
  idx=Math.max(0,Math.min(sentences.length-1,i)); synth.cancel();
  var my=++token; var u=new SpeechSynthesisUtterance(sentences[idx]); var v=pickVoice(); if(v)u.voice=v; u.rate=rate;
  u.onend=function(){ if(my!==token)return; if(idx+1<sentences.length){speakIdx(idx+1);} else {playing=false;stopTimer();renderP();} };
  synth.speak(u); playing=true; startTimer(); highlight(); renderP();
}
function highlight(){
  // approximate sentence highlight by wrapping is complex; just scroll cue via title
}
function stop(){ playing=false; token++; if(synth)synth.cancel(); stopTimer(); }
document.getElementById('pb').onclick=function(){ if(!synth)return; if(playing){playing=false;token++;synth.cancel();stopTimer();renderP();} else {speakIdx(idx);} };
document.getElementById('rb').onclick=function(){ elapsed=0;document.getElementById('elapsed').textContent='0:00'; if(playing)speakIdx(0); else {idx=0;renderP();} };
document.getElementById('sp').onclick=function(){ ri=(ri+1)%rates.length;rate=rates[ri];this.textContent=rate+'×'; if(playing)speakIdx(idx); };
document.getElementById('seek').onclick=function(e){ var r=this.getBoundingClientRect();var t=Math.round(((e.clientX-r.left)/r.width)*(sentences.length-1)); if(playing)speakIdx(t); else {idx=Math.max(0,Math.min(sentences.length-1,t));renderP();} };
document.getElementById('notes').addEventListener('input',function(){ localStorage.setItem('hok-notes-'+CH[cur].n,this.value); });
document.getElementById('copyBtn').onclick=function(){ navigator.clipboard.writeText(document.getElementById('prose').innerText).then(function(){var b=document.getElementById('copyBtn');var o=b.textContent;b.textContent='✓ Copied';setTimeout(function(){b.textContent=o;},1300);}); };
document.getElementById('openBtn').onclick=function(){ alert('Chapter files are in:\nOneDrive\\Documents\\Heights of Knowledge\\\n\nEdit the .md there, then re-run build-hok-dash.js to refresh this Studio.'); };
buildNav(); select(0);
if(synth){synth.onvoiceschanged=function(){};}
</script>
