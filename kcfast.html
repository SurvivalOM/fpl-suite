<script>
var SECTIONS = [
  {part:"Front matter", title:"Epigraph — Tirukkural 391", text:`Before the book begins, an old verse from the Tamil sage Thiruvalluvar, written more than a thousand years ago. In transliteration: Karka kasadara karpavai, katrapin nirka adharku thaga. And in plain English: learn thoroughly, and without flaw, whatever is worth learning; then live by what you have learned. It is verse three hundred and ninety one of the Tirukkural, from the chapter on learning. Two short lines that hold the whole of this book. Learn it well. Then live by it.`},

  {part:"Opening", title:"What is KC FAST?", text:`Every one of us began the same way: knowing nothing at all. We were born without a language, without a single fact, without the faintest idea of how the world works. Whatever we are today, we built from that empty beginning. And from that beginning, one thing more than any other shaped the course of our lives: how much true knowledge reached us, and how soon. Not how clever we were. Not how rich our family was. How quickly the right knowledge arrived. This is the first quiet truth of this book. Knowledge is not a luxury for the few. It is the first need of every person born, as basic as food and shelter, because without it we cannot tell a good road from a bad one, a friend from a trap, or a real need from a passing craving. And here is what should trouble us all. The one thing every human most needs, we have somehow learned to lock behind a price. We charge for schooling, we charge for skills, and we charge even for the simple knowledge of how to live well. The most important inheritance of our species has quietly become something you must first be able to afford. KC FAST begins by refusing that. It says the fundamentals, the few unchanging truths a person needs in order to live wisely, must be handed over freely, to everyone, at any age, and as fast as we can give them. But it goes one step further, and this step is the soul of the whole idea. Knowledge alone changes nothing. A truth you have heard but do not live by is worth no more than a truth you never met. So this book asks three things of you, in this order. Receive the knowledge. Then live by it, truly, in the way you act. And then, to keep it alive within you, give it onward, freely, to the next person. That simple loop, receive, live, and give, is the entire heartbeat of KC FAST. Now here is the surprise. Everything I have just said is already hidden inside the name. KC FAST is not a slogan. It is the whole idea, folded into a few short words. KC is Knowledge Consciousness, the knowing, and the living by it. FAST is Free, for All Souls, and Timeless, and it is also exactly what it sounds like, quick. The pages that follow do only one thing. They open that name, one word at a time, and let each word say what it truly means. By the final word, you will hold the entire idea in your hands, and it will feel less like something you were taught, and more like something you always knew. So let us begin where the name begins, with a single, enormous word. Knowledge.`},

  {part:"Part I — the name", title:"1 · Knowledge", text:`Start with the word itself. Knowledge comes from an old, old root, gno, that runs under Latin, Greek, Sanskrit, and our own English, and it means simply, to know. But the first thing the word ever meant was sharper than to have information. In Old English, to know, cnawan, meant to perceive that one thing is distinct from another. To tell this from that. To separate the real from the false. Hold on to that, because it changes everything. Knowledge, at its root, is not a pile of facts. It is the power to distinguish. We forget this, because we live buried in information. We have never had more of it: a whole library in our pocket, an answer to any question in seconds. And yet we are not wiser for it. We are more anxious, more confused, more easily fooled. Information is not knowledge. Information is the raw heap. Knowledge is the eye that looks at the heap and says, this is true and that is false, this helps me and that harms me, this matters and that is only noise. Let me show you the difference with a story you have seen, in one form or another, a hundred times. A hardworking farmer needs to dig a well, so he takes a loan. The lender reads the papers out quickly, points to a line, and the farmer signs. He walks home relieved. Notice this: he had all the information. The paper was in his own hands, every number printed plainly upon it. What he did not have was knowledge, the power to see that the small print had quietly turned a one-year loan into a lifetime of interest, and that his land was the silent collateral. A year later the well runs dry, and the field is no longer his. He was not cheated by a lack of information. The whole truth sat right there on the page. He was undone by a missing power to distinguish. And that missing power carried a price he could not pay: a lawyer, an education, even a single literate friend. The very knowledge that would have saved his land was sold at a counter he could not reach. This is not one unlucky man. It is the daily shape of the world. The people most easily exploited are rarely the least intelligent. They are the ones who were never handed the basic knowledge to tell a fair deal from a trap. And it begins the moment we arrive. Every one of us is born knowing nothing. From that helpless start, one thing above all decides the shape of a life: how quickly, and how truly, knowledge is poured in. So here is the quiet scandal of our age. The one thing every newborn most needs, knowledge, is the very thing we have learned to lock behind a price. KC FAST begins by refusing that. It says the fundamentals must be handed over freely, to everyone, and as fast as we can give it. Not as charity, but because it was always theirs to begin with. That is the first word of the title, and the first promise of the whole work. Knowledge: the power to tell what is true, owed to every soul the moment they are born.`},

  {part:"Part I — the name", title:"2 · Consciousness (the word)", text:`Now take the second word, the quiet hinge of the whole title: consciousness. It comes from the Latin conscire, made of two pieces: com, meaning with, or together, and scire, to know. So consciousness, at its root, is not merely to know, but to know with. To be awake to a thing, within, and together. And scire itself reaches back to a still older root meaning to cut, to split, the very root that gives us science and conscience. Buried in the word is the same act we met in knowledge: to separate, to tell apart, only now turned inward. Here is the difference that decides everything. Knowledge is a fact you hold. Consciousness is that fact woken up inside you. Knowledge is the lamp. Consciousness is the lamp lit.`},

  {part:"Part I — the name", title:"2b · The Pivot — the turn", text:`Stop here. Of everything in this book, this is the page to remember. We almost all believe the same quiet thing about our own lives: that what stands between us and the life we want is something we do not yet know. So we keep searching. One more book. One more course. One more expert with one more secret. We are sure the missing piece is out there, just ahead, and that when we finally find it, everything will change. Let me say to you, as gently and as plainly as I can, that this is not true. You already know enough to change your life. You do. You know how you should be eating. You know what you should be doing with your money. You know the call you should make, the habit you should end, the work you keep walking past. None of this is news to you. The knowledge has been sitting inside you for years, waiting. It was never the knowing that you lacked. It was the doing. And here is the part that aches, if we are honest enough to feel it. You have already met the person you could become. You have seen him, clearly, in your best moments, the one who does the thing, keeps the promise, lives the truth you both already know. You have met him a hundred times. And a hundred times, quietly, you have turned and walked the other way. Not through some great dramatic failure. Just one more ordinary day of knowing the better thing, and doing the easier one. That is the real sorrow of most lives, and it is not a loud one. It is not ruin. It is a slow, quiet settling for less than we knew we were capable of, one small surrender at a time, until the years are simply gone. Understand why this happens, because there is no shame in it, only a trap that catches us all. There are two of us living in here. One of them knows. He reads, he understands, he nods along, he could teach it to others. The other one acts, and it is that second one who actually builds the life. We feed the first, and we starve the second. We have been told, all our lives, that to learn a thing is nearly to have done it, so that reading about courage can feel like courage, and knowing the answer can feel like changing. It is the gentlest lie we tell ourselves, and it can quietly cost us everything while we feel busy and wise. This is the whole meaning of Consciousness, the second word of our title. It is not knowing more. It is the bridge from the one who knows to the one who does. It is the instant a truth leaves your head and shows up in your hands. A knowledge that never crosses that bridge was never truly yours. It was a guest in your mind who never once moved in. So feel the full weight of this, and then let it set you free, because freedom is exactly what it is. You are not what you know. You are what you do with what you know. You are not one book away from a better life. You are one act away from it, and that act is waiting for you today, inside something you already understand. The person you keep walking away from is still there. The next time you meet him, do not turn around. This is the lamp, at last, being lit. Everything before this page was gathering light. Everything after it is learning to live by it.`},

  {part:"Part I — the name", title:"2c · Knowledge not lived is wasted", text:`There is a strange kind of waste that almost no one notices, because it leaves nothing behind to see. It is the waste of knowledge we worked hard to gain, and then never used. Think for a moment about what learning actually costs. It costs time, the one part of our life we can never earn back. Every book read, every course taken, every lesson sat through, is paid for in hours that will not return. We make this investment again and again, gathering knowledge across our whole lives. And then, far too often, we simply do not act on it. The knowledge sits in the mind like money buried in the ground, doing nothing, helping no one, earning nothing. The investment was real. The return is zero. This is not a small or rare failing. It is so common, and so costly, that two scholars at Stanford built a whole study around it and gave it a name: the knowing-doing gap. Their finding was striking. Companies pour billions into training, consultants, and clever plans, and still very little changes, because knowing what to do and actually doing it turned out to be two completely different things. They called the trap that catches us the smart-talk trap, where talking about a thing, and even knowing it deeply, quietly takes the place of doing it. If great companies fall into this, then so do we all, every single day. Now follow this to its sharp edge. Picture two people. One is well educated. He reads easily, listens well, and gathers knowledge faster than most. The other never had that chance, and knows far less. Surely the educated one holds the advantage. But watch what they actually do. If the educated man takes in all his knowledge and then does not act on it, his life looks no different from the life of the man who never learned it at all. The same mistakes, the same struggles, the same results. So we must ask a hard question. If his learning changes nothing in how he lives, what exactly was it for? And here is the part that stings. He is not merely equal to the uneducated man. He is behind him. Because the uneducated man at least did not spend his hours gathering what he would never use, while the educated man paid the full price in time and walked away with nothing to show for it. Knowledge that is not lived does not lift you above the one who never had it. It can leave you below him, poorer by all the time you spent. We do not say this to shame anyone, for nearly all of us are guilty of it. We all know more than we live by. The point is not blame. The point is a simple and freeing realisation: the worth of knowledge was never in the having of it. A truth only begins to pay you back the moment you act on it. The least-read person who lives by what little he knows is wiser, and better off, than the scholar who lives by none of his. To know is only to hold the lamp. To live by it is to light it. And an unlit lamp, however fine, leaves you exactly as much in the dark as having no lamp at all.`},

  {part:"Part I — the name", title:"3 · Free", text:`The third word turns the whole title outward: free. And it hides the most beautiful secret of them all. Free does not come from any word about cost or money. It comes from an ancient root meaning dear, beloved, from a word that simply meant to love. In the old tribes, the free people were the beloved ones, the family, set apart from those held in bondage. Free and friend grow from the very same root. So at the bottom of the word free there is no price tag at all. There is love. That gives the word two faces, and KC FAST means both. Free, as in given without a price. And free, as in set loose, because knowledge is the very thing that releases a human from the bondage of ignorance. The opposite of free, remember, was never cheap. The opposite of free is enslaved. So to lock the fundamentals behind a price is not a neutral piece of business. By the word's own roots, it keeps people in a kind of bondage. And to give them away is not charity. It is, quite literally, an act of love. But there is a second, stranger reason KC FAST gives knowledge away, and it is the beating heart of the whole book. Giving is how the giver stays awake. A knowledge you keep to yourself slowly falls asleep. A knowledge you give away stays alive, because to hand it on you must hold it, order it, live it, and say it out loud. You have felt this yourself. Think of something you only half understood, until the day someone asked you to explain it. Suddenly you had to find the words, fill the gaps, and answer their doubts, and in teaching it you finally understood it. You did not lose the knowledge by giving it. You owned it for the first time. This is the fourth key in my book TransCare, the key of teaching. The earlier keys change you. But the fourth key, teaching, is the one that makes the change permanent. You do not fully possess anything until you give it away. And yet almost everything around us whispers the opposite. Hold your knowledge close, it says, it is your edge. So people hoard. And here is the strange punishment: the hoarder does not even keep what he hoards. Locked away and never given, it dims, while the one who gives freely grows brighter each time he gives. There seems to be a quiet law beneath this, the one people today call karma, that whatever you give out finds its way back to you. We will not lean on that law here, for it deserves a book of its own, but the giver rarely ends up the poorer. This is why the F in FAST is Free. We give the fundamentals away, to everyone, at no price, for two reasons at once. Because by the oldest meaning of the word it is an act of love that sets people free. And because giving is the one way the giver keeps the knowledge alive in himself. Charge for knowledge, and you bind people. Give it free, and you free two souls at once: the one who receives it, and the one who hands it on.`},

  {part:"Part I — the name", title:"4 · All", text:`The fourth word is the shortest in the title, and the hardest to keep: all. It comes straight from the Old English eall, meaning the whole, the entire, every one, without exception. There is nothing partial in it. All means all, with no quiet asterisk, no fine print, no except for them. And that makes it the boldest claim in the whole title. Because almost every system that has ever held knowledge was built to do the opposite of all. It was built to choose. Knowledge for the priest, not the people. For the guild, not the apprentice. For those who can pay the fee, pass the exam, or be born on the right street. To say the fundamentals are for all is to break a rule the world has kept for thousands of years. Picture two babies in the same hospital ward, born on the same night, an hour apart. Lay them side by side and you could not tell which life is which. Both know nothing. They begin exactly equal. Then they go home. One goes to a house lined with books, full of talk at the dinner table, with patient adults who answer every question. The other goes to a home where every hour is eaten by survival, where no one has the time, the words, or the knowledge to spare. Twenty years later, those two stand in different worlds. And here is the part we must be honest about. The distance between them was not carved by intelligence. They started equal in that ward. It was carved by one thing: knowledge reached one of them, early and often, and barely reached the other. The gap we call inequality is, underneath, a knowledge gap. We rarely see this, because exclusion usually wears a respectable face. It calls itself standards, or admissions, or membership, or simply the price of the course. Each gate seems reasonable on its own. But stacked together, they quietly sort humanity into those who get the keys and those who never do. And the cruelty is that the ones shut out are not the least able. They are only the least reached. So when KC FAST says the fundamentals are free for All, it means the word with no softening. Not all who can afford it. Not all who qualify. Every person, of any age, any background, any starting point. If a human being was born, the fundamentals are theirs. Every other school begins by deciding whom to leave out. This one begins with a word that leaves no one out. All.`},

  {part:"Part I — the name", title:"5 · Souls", text:`The fifth word is the most human in the title: souls. In a practical, down to earth book like this one, it can seem a strange word to choose. We could have said people, or minds, or learners. We chose souls, and on purpose. The word comes from the Old English sawol, and it did not mean a ghost or a religious idea. It meant the living, feeling, thinking, willing part of a person. By a few centuries later it had come to mean, very simply, a person, a human being. So when we say souls, we are not leaving the material world at all. We are pointing at the whole, living human in front of us. And that choice carries a quiet protest. Because look at all the other names the modern world has for a human being. A user. A customer. An audience. A lead. A segment. A number on a register, a data point on a chart, a seat to be filled. Each of those words keeps only the part of the person that is useful to someone else, and quietly throws the rest away. I think of a boy who, for years, was only a roll number. In a crowded classroom he was attendance, marks, a statistic in a pass percentage. He began to believe he was what the system saw, a number, and a low one. Then one teacher, just one, learned his name, asked what he loved, and spoke to the part of him that hoped and feared and wanted. Nothing on paper changed that week. But the boy changed, because for the first time someone had treated him not as a number, but as a soul. That is the difference one word can make. This is what the world tends to do at scale. It counts people, because counting is easy and souls are not. And slowly, almost without noticing, we start handing knowledge to numbers instead of to people. Something essential leaks out of it on the way. So the S in FAST is Souls, and it is a promise about how the giving is done, not only who receives it. Every person we reach is a whole human being, one who feels, who chooses, who carries hopes we cannot see on any form. KC FAST is not knowledge poured into a crowd. It is knowledge handed, as far as we can manage it, from one soul to another. The world has a hundred words that keep only the useful part of a person. This title keeps the whole of them in one. Souls.`},

  {part:"Part I — the name", title:"6 · Timeless", text:`The sixth word stretches the whole promise across a lifetime: timeless. Take it apart and it is lovely. Time, in its oldest root, meant to divide, because time is the great divider, the thing that cuts our life into pieces: years, terms, ages, seasons, and deadlines. And the ending, less, comes from a word meaning freed from, loosed from. So timeless, at its root, means freed from the cutting of time. That gives the word two faces, and KC FAST holds both. The first is about the knowledge itself. The fundamentals do not expire. A trick for this year's phone is stale by next year, but the basic truths, how value works, how the mind works, how to tell the true from the false, were as true a thousand years ago as they will be a thousand years from now. That is timeless knowledge. The second face is about you, the learner, and it is the one I care about most. To be timeless is to be unbound by age. There is no right age for the fundamentals, and no closing bell. Most of us secretly believe the opposite. We feel that learning belongs to the young, that there was a window, and that ours has quietly shut. I did not learn it back then, we tell ourselves, so it is too late for me now. That belief is a cage, and it is built out of nothing. Think of a woman who reaches fifty never having understood money. She assumes that ship has long since sailed. Then one ordinary week she begins, slowly, to learn what a budget is, what interest does, how to tell a fair deal from a trap. Within a year she is steadier than she has ever been, not because she became young again, but because the knowledge never had an age limit in the first place. The world loves to put a clock on learning. School is for children. Degrees are for the twenties. After that the doors are felt to close, and a person who starts late is made to feel foolish. So millions stop before they begin, not because they cannot learn, but because they believe they are too late. The clock did the harm, not their ability. Timeless takes that clock off the wall. The fundamentals are open to anyone, at any age, from wherever they left off. And there is one more layer in the word. Every human being is born ignorant, and every one of us, having learned a little, soon needs the next level up. The need never ends, in any person or in any generation. So the giving never ends either. This is eternal business, not a campaign that finishes, but a fire we keep passing, hand to hand, for as long as people are born. Knowledge has no expiry date, and neither do you. It is never too early, and it is never, ever too late.`},

  {part:"Part I — the name", title:"7 · Fast", text:`And so we come to the last word, the one that gives the whole movement its name and its drive: fast. Here is the surprise, the best one yet. For most of its life, the word fast did not mean quick at all. Its oldest meaning, in Old English, faest, was firm, fixed, steadfast, secure. To hold fast was to grip and not let go. To stand fast was to hold your ground. The sense we lean on today, quick and rapid, came much later, and it grew out of the older one, firmly hardening into vigorously, and vigorously into swiftly. And from the very same root comes another fast, the one we mean when we fast from food, to hold oneself firm, in self-control. So this one small word carries three truths at once, and KC FAST means all three. It is firm. It is quick. And it asks for self-mastery. First, firm. What we hand over are not opinions or trends, they are foundations, the kind of truth you can stand on and build on without fear that it will shift beneath you. You are given bedrock, not sand. Second, quick. The firm foundations are given to you fast, without wasting the best years of your life. The few things that matter most, you can hold in a short time, and begin to live by at once. Third, and most easily forgotten, self-mastery, the fasting sense, to hold fast. Because knowing a truth quickly is worth nothing if you cannot hold to it when you are tempted to let go. Picture two people given the same firm truth about money: spend less than you earn, and never chase easy riches. Months later a glittering scheme arrives, promising to double their savings in ninety days. One holds fast to what he learned and walks away. The other lets go of it for the thrill, and loses everything. The difference was not knowledge. It was whether they could hold fast. Our age has fallen in love with only one of these meanings. It worships quick and forgets firm. Fast food, fast money, fast opinions, an endless fast scroll, all speed and no ground. And so people move faster and faster while sinking, because speed without firmness is only a quicker way to fall. KC FAST puts the meanings back together. Quick, yes, but quick onto firm ground, and held with a steady hand. And with that, the title is whole. Knowledge, the power to tell true from false. Consciousness, that knowledge woken up and acted upon. Free, given as an act of love. All, with no one left outside. Souls, every whole and living person. Timeless, with no expiry and no age. And Fast, firm and quick and held with self-mastery. Hold fast. Learn fast. And then, hand it on.`},

  {part:"Part II — the chain", title:"8 · Knowledge Transfer", text:`There is a term that every serious company knows, and quietly fears. It is called knowledge transfer, or simply K T. It means this: when an experienced person leaves, their knowledge must be passed to the next person before they walk out the door, or it is lost forever. And businesses have learned, the hard way, that this is not easy. The simple things can be written down, the passwords, the procedures, the files. But the most valuable knowledge cannot. It lives inside the person, in their hands and their judgment, built from years of doing. Researchers call this tacit knowledge, the kind we know but cannot fully put into words. A veteran can fix the machine by the sound it makes, and could never write a manual that truly captures it. So when that veteran retires, something walks out of the door that no document holds. The study of this, by two scholars named Nonaka and Takeuchi, grew into an entire field. That is how seriously the business world takes it. Now lift your eyes from the single company to the whole human race, and you find the very same thing, on a far grander scale. Every one of us is, in a sense, an employee who will one day leave. We each spend a life gathering knowledge, a little of it written, most of it simply lived, and then we go. And if we have not transferred it, it dies with us. A whole life of hard-won understanding, gone, as though it had never been. This, in truth, is the one thing that separates us from every animal. A tiger today knows no more than a tiger ten thousand years ago, because a tiger cannot pass on what it learns. Each generation of animals begins again at zero. We do not. We stand on the shoulders of everyone who came before us, because human beings can carry knowledge across time. Scholars call this the ratchet effect, after the gear that turns forward and never slips back. That single ability, knowledge transfer across the generations, quietly built everything we call civilization. And notice how deep the urge runs in us. The master craftsman, near the end, searches for the right apprentice. The grandmother aches to teach the grandchild before her time is up. We feel, in our very bones, that knowledge must not be allowed to die with us. But here is the quiet failure. The business world carefully transfers its commercial know-how, because money is at stake. Yet humanity has been careless with its most important knowledge of all: how to handle money, how to master the mind, how to live well. So each new generation is left to relearn the basics of being human the hard way, from scratch, paying the same painful tuition that a hundred generations paid before them. We transfer our jobs, but not our wisdom. KC FAST exists to close that gap. It is knowledge transfer for humanity itself, carried deliberately and freely from one person to the next, and from each generation to the one that follows. A company protects its know-how so the business will not die. We protect the fundamentals so that wisdom will not die, and so that no one need ever start again from nothing. Do not let it leave with you. Pass it on, and keep the long human chain unbroken.`},

  {part:"Part II — the chain", title:"9 · One lamp lights many", text:`Imagine a single lamp burning in a dark hall. Someone walks up with an unlit lamp, touches one flame to the other, and walks away carrying light. Now there are two flames where a moment ago there was one. And here is the quiet miracle: the first lamp is no dimmer for it. It gave away fire, and lost nothing at all. This is the secret property of knowledge, and it makes knowledge unlike almost everything else we own. If I give you my bread, I have less bread. If I give you my money, my purse grows lighter. Nearly everything material divides when we share it. But if I give you what I know, I do not know any less. We simply both know it now. Knowledge is the rare thing that does not shrink when it is given. Now watch what happens when this does not stop. The lamp you lit goes on to light another, and that one lights a third, and the third a fourth. One becomes two, two become four, four become eight. A single flame, passed from hand to hand, can fill an entire hall with light, and then a whole city, without the first flame ever going out. This is how one truth, freely given, can reach a million people. Not by one voice shouting to a million at once, but by each person quietly lighting the next. Think of a single good teacher. She teaches thirty children. A few grow up to become teachers themselves, and each of those teaches thirty more, who in time teach thirty more again. Follow it down the years, and that one woman, long gone, is still lighting minds she will never meet. This is also why a movement built on giving knowledge never has to be forced. We do not need to reach every person ourselves. We need only reach a few, and reach them truly, deeply enough that they long to light the next few. Done well, the thing carries itself. Each person who receives it becomes a person who gives it, and the circle widens on its own, lamp by lamp. But there is one condition, and it is the same truth we keep returning to. A lamp can only light another lamp if it is itself burning. You cannot pass on a knowledge you do not yourself live. The person who only memorised the words has no fire to give, and the chain stops at him. But the person who truly lit his own lamp can set a whole room alight simply by being near others. This is the deepest reason the loop matters. Receive, live, give. So do not measure what you know by how much you have gathered. Measure it by how many lamps you have lit. One flame, freely shared, never grows smaller. It only fills the dark with more and more light, long after the hand that first carried it is gone.`},

  {part:"Part II — the chain", title:"10 · Ignorance, the real enemy", text:`We are quick to blame many things for human suffering. We blame poverty, or bad luck. We blame other people, or the times we live in, or simply fate. But if you trace almost any sorrow back, far enough and honestly enough, you tend to arrive at the same quiet root. Someone did not know something they needed to know. Ignorance, the simple absence of knowledge, is the enemy hiding behind most of our troubles. Let us be careful with that word, ignorance, because it is often hurled as an insult, and that is not how we mean it. Ignorance is not stupidity. It is not a flaw in a person. It is only this: not having a particular piece of knowledge at the moment you needed it. Every one of us is ignorant of almost everything. The danger is never our general ignorance. The danger is being ignorant of the few things that quietly decide our lives. Look at how much harm flows from exactly that. A family loses everything because no one truly understood how money works. A body breaks down far too early because no one was ever taught how to care for it. A marriage falls apart because two good people never learned how to understand each other. Pull the thread on almost any pain, and you find, at the other end, a piece of knowledge that simply never arrived. This is why ignorance deserves to be called the real enemy, and not poverty or misfortune, which are so often only its children. And it is a clever enemy, for one reason. It hides. You cannot see what you do not know. A man missing a vital piece of knowledge does not feel a gap where it should be. He simply feels that life is hard, never once suspecting that a single missing piece is the cause of it all. Worse still, ignorance often wears the mask of confidence. The less we know about something, the simpler it looks, so we are surest of ourselves in exactly the places where we know the least. But here is the great mercy in all of this. Ignorance is the one enemy in all the world that surrenders completely to a single weapon, and that weapon is knowledge. It cannot survive the light. You do not need an army to defeat it, or money, or power. You need only the right knowledge, given to the right person, in time. The moment the missing piece arrives, the enemy that caused so much harm simply vanishes, the way darkness vanishes when you light a lamp. So understand clearly what war this book is really fighting. It is not against any person, or any group, or any nation. The enemy is ignorance itself, the one foe that every human being on earth shares. And the weapon against it is free, and light enough for anyone to carry, and it grows stronger every time we place it in another hand. We are not here to fight each other. We are here, all of us together, to drive back the same ancient darkness, one lit lamp at a time.`},

  {part:"Close", title:"Hold fast, learn fast, hand it on", text:`We have come to the end, and the end is simple, because the whole book was always folded into a few short words. Knowledge Consciousness, Free for All Souls, and Timeless. Receive the knowledge. Live by it. Give it onward. That, truly, is all of it. So let me ask you one thing, and only one thing, as we part. Do not let this book become the very thing we warned against, one more pile of knowledge that you have, and do not use. That would be the saddest ending of all. Let it be the opposite. Choose one truth from these pages, even a single one, and begin to live by it today, not someday. A small thing lived will always beat a great thing merely known. Then remember the three short steps the title quietly taught us. Hold fast, to the few truths that are firm and worth keeping. Learn fast, reaching for the next piece without waiting for the perfect moment, at whatever age you find yourself. And hand it on, freely, to the next person, because that is how you keep it alive in yourself, and how the light spreads beyond you. If something in these pages has stirred you, know that it does not end here. This book is only a doorway. The living, growing form of all this is a community called Future Proofing Lifestyle, where the fundamentals are taught, practised, and passed on together, by ordinary people helping one another rise. Come and find us there. Come, at first, to receive. And then, in time, to give, to become one of the lamps that lights the next. You were born, as all of us were, knowing nothing at all. You need not leave that way. Take the knowledge. Live by it. And before you go, place it gently into another waiting hand. Hold fast. Learn fast. Hand it on.`}
];

var synth = window.speechSynthesis;
var STORE = 'kcfast_dash_done_v1';
var done = {};
try { done = JSON.parse(localStorage.getItem(STORE) || '{}'); } catch(e){ done = {}; }

var cur = -1, idx = 0, playing = false, rate = 1, curUtter = null;
var speeds = [1,1.25,1.5,2,3,0.75];
var sents = [], spans = [];
var transcript = document.getElementById('transcript');
var fill = document.getElementById('fill'), knob = document.getElementById('knob');
var counter = document.getElementById('counter'), playBtn = document.getElementById('play');
var pLbl = document.getElementById('pLbl'), pWc = document.getElementById('pWc');

function splitS(t){ return t.replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+(?=[A-Z])/); }

function buildTOC(){
  var toc = document.getElementById('toc'); toc.innerHTML='';
  var lastPart='';
  SECTIONS.forEach(function(s,i){
    if(s.part!==lastPart){ lastPart=s.part; var pl=document.createElement('div'); pl.className='partlbl'; pl.textContent=s.part; toc.appendChild(pl); }
    var wc = s.text.trim().split(/\s+/).length;
    var row=document.createElement('div'); row.className='row'+(done[i]?' done':'')+(i===cur?' active':''); row.dataset.i=i;
    row.innerHTML='<div class="chk">'+(done[i]?'&#10003;':'')+'</div><div class="meta"><div class="rt"></div><div class="rd">'+wc+' words</div></div><div class="play-mini">&#9654;</div>';
    row.querySelector('.rt').textContent=s.title;
    row.querySelector('.chk').addEventListener('click', function(e){ e.stopPropagation(); done[i]=!done[i]; localStorage.setItem(STORE, JSON.stringify(done)); buildTOC(); updateProg(); });
    row.addEventListener('click', function(){ load(i); });
    toc.appendChild(row);
  });
}
function updateProg(){
  var n=0; SECTIONS.forEach(function(s,i){ if(done[i]) n++; });
  document.getElementById('prog').textContent = n+' of '+SECTIONS.length+' reviewed';
}
function renderTranscript(){
  transcript.innerHTML=''; spans=[];
  sents.forEach(function(s,i){
    var el=document.createElement('span'); el.textContent=s+' ';
    el.addEventListener('click', function(){ jump(i); });
    transcript.appendChild(el); spans.push(el);
  });
}
function load(i){
  stop();
  cur=i; idx=0;
  var s=SECTIONS[i];
  sents=splitS(s.text);
  pLbl.textContent=s.title;
  pWc.textContent=s.text.trim().split(/\s+/).length+' words';
  renderTranscript(); setProgress(); highlight(); buildTOC();
  transcript.scrollTop=0;
}
function setProgress(){
  var frac= sents.length<=1?0: idx/(sents.length-1);
  fill.style.width=(frac*100)+'%'; knob.style.left=(frac*100)+'%';
  counter.textContent= sents.length? (idx+1)+' / '+sents.length : '';
}
function highlight(){
  spans.forEach(function(el,i){ el.className = (i===idx)?'cur':''; });
  var c=spans[idx];
  if(c){ var top=c.offsetTop, bot=top+c.offsetHeight;
    if(top<transcript.scrollTop) transcript.scrollTop=top-10;
    else if(bot>transcript.scrollTop+transcript.clientHeight) transcript.scrollTop=bot-transcript.clientHeight+10;
  }
}
function iconPlay(){ playBtn.innerHTML='&#9654;'; }
function iconPause(){ playBtn.innerHTML='&#10073;&#10073;'; }
function speak(i){
  if(cur<0) return;
  synth.cancel(); idx=Math.max(0,Math.min(i,sents.length-1));
  var u=new SpeechSynthesisUtterance(sents[idx]); u.rate=rate; u.lang='en-US';
  u.onend=function(){ if(u!==curUtter) return; if(idx<sents.length-1){ speak(idx+1); } else { playing=false; iconPlay(); } };
  curUtter=u; synth.speak(u); playing=true; iconPause(); setProgress(); highlight();
}
function play(){ if(cur<0){ load(0); } if(playing){ curUtter=null; synth.cancel(); playing=false; iconPlay(); } else { speak(idx); } }
function stop(){ curUtter=null; synth.cancel(); playing=false; iconPlay(); }
function jump(i){ var was=playing; curUtter=null; synth.cancel(); idx=Math.max(0,Math.min(i,sents.length-1)); setProgress(); highlight(); if(was) speak(idx); else { playing=false; iconPlay(); } }

document.getElementById('play').addEventListener('click', play);
document.getElementById('restart').addEventListener('click', function(){ jump(0); });
document.getElementById('prev').addEventListener('click', function(){ jump(idx-1); });
document.getElementById('next').addEventListener('click', function(){ jump(idx+1); });
document.getElementById('psec').addEventListener('click', function(){ if(cur>0) load(cur-1); });
document.getElementById('nsec').addEventListener('click', function(){ if(cur<SECTIONS.length-1) load(cur+1); });
var spdBtn=document.getElementById('spd');
spdBtn.addEventListener('click', function(){ rate=speeds[(speeds.indexOf(rate)+1)%speeds.length]; spdBtn.innerHTML=rate+'&times;'; if(playing) speak(idx); });
var track=document.getElementById('track');
function seekE(e){ var r=track.getBoundingClientRect(); var f=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); jump(Math.round(f*(sents.length-1))); }
track.addEventListener('click', seekE);
var drag=false;
knob.addEventListener('mousedown', function(e){ drag=true; e.preventDefault(); });
window.addEventListener('mousemove', function(e){ if(drag) seekE(e); });
window.addEventListener('mouseup', function(){ drag=false; });
window.addEventListener('pagehide', function(){ synth.cancel(); });
setInterval(function(){ try{ if(synth&&synth.speaking&&!synth.paused){ synth.pause(); synth.resume(); } }catch(e){} }, 9000);

buildTOC(); updateProg();
</script>
</body>
</html>
