, is worse than no philosophy at all, because it teaches everyone watching that the words are not to be trusted. The fastest way to make people stop believing in good money, in focus, in any of it, is to preach it loudly and live the opposite."},{"t":"h","s":"The inner rot"},{"t":"p","s":"There is a cost to hypocrisy that almost no one talks about, and it is the most dangerous one, because it works on you in secret. Every gap between your word and your deed quietly erodes your trust in yourself."},{"t":"p","s":"Think about what happens each time you tell yourself you will do something, and then you do not. You promise to start tomorrow, and tomorrow you do not. You swear this time you will focus, and then you drift. Each one of these seems small. But every broken promise to yourself teaches a quiet lesson, and the lesson is this. My word, even to myself, does not mean very much. And once you have taught yourself that lesson deeply enough, your whole discipline collapses, because discipline is built entirely on the trust that when you decide something, you will actually do it. A person who has lost faith in his own word cannot make himself do anything, because some part of him no longer believes he will. This is the inner rot of hypocrisy. It does not just fool other people. It dissolves the very foundation you stand on, until you cannot rely on yourself at all."},{"t":"p","s":"The opposite is just as powerful, and it is one of the great quiet sources of strength. Every time you say you will do a thing and then you do it, even a tiny thing, you deposit a coin in the bank of self-trust. Do this enough, and you build something priceless. You become a person whose word, given even silently to himself, is as good as done. And a person like that can accomplish almost anything, because when he decides, the deciding is most of the battle already won."},{"t":"h","s":"Earn the right, and be your own first proof"},{"t":"p","s":"We already met the cure for hypocrisy, long ago, though we did not name it as such. It was the idea of earning the right."},{"t":"p","s":"The hypocrite speaks first and lives second, or never. He announces the philosophy and hopes no one checks the life behind it. The hacker reverses the order, exactly as a doer should. He lives the thing first, quietly, and earns the right to speak of it through his own results. He becomes his own first proof. Before he tells anyone else to get wired in, he gets wired in. Before he preaches good money, he builds it. He does not ask the world to follow words he has not first followed himself, because he knows that the only teaching that ever truly lands is the teaching that is backed by a life."},{"t":"p","s":"So the rule is simple, and it is freeing once you accept it. Do not preach what you do not practise. Either close the gap by changing your life to match your words, or have the honesty to stop saying the words until you do. Both of those are clean. Only the third option, saying one thing and doing another and hoping no one notices, is the rot."},{"t":"h","s":"Honest about where you are"},{"t":"p","s":"Now the necessary grace, because a tool this sharp can wound the very people who most want to use it well, and that is not our aim."},{"t":"p","s":"The hypocrisy alert is not a whip for beating yourself, and it does not demand that you be perfect before you are allowed to believe in anything good. There is a vast difference between hypocrisy and honest aspiration, and we must not confuse them. To teach something you are still working on, while openly admitting you are still working on it, is not hypocrisy. It is honesty, and it is beautiful. We are all walking toward an ideal none of us has fully reached. To say, here is what I am striving for, and here is where I still fall short, is the very opposite of hypocrisy. The hypocrisy is only in the pretending, in claiming to have arrived when you have not, in presenting a mastery you do not possess."},{"t":"p","s":"So run the alert with honesty and with kindness, both at once. When you catch a gap between your words and your life, do not collapse into shame and decide you are a fraud. That helps no one, and it is just the flinch we learned about long ago, the ego flinching from an honest look at itself. Instead, do the neutral thing. See the gap clearly, without flinching and without despair, and then simply close it, one of the two honest ways. Change the action to match the word, or soften the word to match the truth of where you really are. This is self-honesty, which is nothing more than the ultra-neutral mind, turned at last upon yourself. Loyal to the truth, even when the truth is about you."},{"t":"p","s":"Make it a quiet, regular practice, the way we made audits of our signal and our distractions. Now and then, sit down and write two short columns. On one side, the things you say you value and the person you claim to be. On the other side, what your actual days reveal you value, judged only by where your time and energy truly went. Then look honestly at the widest gap between the two columns, and choose to close just that one this season, by changing the action or by retiring the claim. You will not run out of gaps, because none of us ever fully closes them all. But a person who closes his single widest gap, season after season, is a person steadily becoming whole, his words and his life drawing closer together until, more and more, they are simply the same thing."},{"t":"p","s":"So this completes the discipline. We protect the work from the world by getting wired in and auditing our distractions. And we protect it from ourselves by running the hypocrisy alert, closing the gap between word and deed, building self-trust one kept promise at a time, and becoming our own first proof. A person with a clear method, the discipline to hold it, and the integrity to live it, is a rare and formidable thing. That is the whole of the Ultra Neutral Growth Hacker as an individual, now built, from the inside out."},{"t":"p","s":"But this book was never only about the individual. We built this person for a reason far larger than his own success. In the final part, we lift our eyes from the single hacker to the mission he serves, and we ask the biggest questions of all. Why does any of this matter? What is it for? And how does one quietly disciplined person become part of something that could actually change the world? We turn now to the mission."}]},{"label":"Chapter 18","part":"Part Five · The Mission","title":"Chapter Eighteen — The Good Money Edge","words":1640,"blocks":[{"t":"p","s":"We have spent this whole book building a person. A clear mind, fast and lean hands, deep discipline, and an honest heart, all pointed at good money, the kind that lifts and never drains. Now we must ask the question that has been waiting patiently underneath every chapter. Why? Why build such a demanding person? Why not something easier?"},{"t":"p","s":"Here is the answer, and it is the reason this book exists at all. Because the good must learn to win. And in the world as it actually is, winning at good money is hard, far harder than winning at bad money, and the good have lost too often, for too long, simply because they were not sharp enough to beat the ruthless. This book is here to change that."},{"t":"h","s":"The hard truth we must face"},{"t":"p","s":"Let us state the problem plainly, the way we always do, because pretending it away helps no one. Bad money has a head start."},{"t":"p","s":"We saw this early on. It is faster, in the short term, to exploit than to serve, to trap than to earn, to take more than you give. The person willing to cut every corner, deceive a little, and drain his customers can often move quicker and cheaper, at first, than the person who refuses all of that. So the good-money builder begins every race at an apparent disadvantage. He has tied one hand behind his back on purpose, by refusing the dirty shortcuts, and his bad-money competitor has not."},{"t":"p","s":"This is exactly why so many good people quietly give up, or lose. They look at the cheaters racing ahead, they conclude that you cannot win clean, and they either surrender the field entirely or slowly become the very thing they hated. The world is full of people who started out wanting to do good and ended up doing bad, because they could not find a way to make good win. We refuse both of those endings. We are not going to surrender, and we are not going to compromise. We are going to find the way to make good money beat bad money in a fair fight, and then we are going to take it."},{"t":"h","s":"The toolkit was the edge all along"},{"t":"p","s":"Now comes the turn, and it is the heart of this chapter. How does the good-money builder overcome the head start of the cheater? With everything we have spent this book building. The entire toolkit of the Ultra Neutral Growth Hacker is, and always was, the edge that lets good money win."},{"t":"p","s":"Think about what it means. The good-money builder cannot use the cheap exploit, so he must be more resourceful. He cannot trap his customers, so he must serve them so well they stay freely. He cannot coast on deception, so he must out-think, out-build, and out-improve the competition on the things that genuinely matter. In other words, precisely because he refuses bad money, he is forced to become excellent. The constraint of staying clean does to him exactly what an empty pocket did in an earlier chapter. It squeezes a sharper, faster, more inventive person out of him than comfort ever could."},{"t":"p","s":"This is the great reframing. The discipline of this book is not a noble handicap that good people accept and then lose with gracefully. It is the competitive weapon that lets them win. The cheater never had to develop these skills, because cheating was easy, and easy things make soft people. The good-money builder, denied the easy path, builds the muscles the cheater never needed, and in the long race those muscles are decisive. We did not build this demanding person in spite of his refusal to do bad. We built him because of it. The refusal is what forged the edge."},{"t":"h","s":"Two things bad money can never match"},{"t":"p","s":"Beyond the sharpened skills, the good-money builder has two structural advantages that the bad-money competitor can never truly copy, no matter how clever he is."},{"t":"p","s":"The first is trust, and we have spoken of it before, but now we see its full power. Good money compounds loyalty. Every honestly served customer comes back, brings others, and forgives the occasional stumble, building a moat of earned trust around the business that no competitor can storm. Bad money can never build this moat, because bad money must keep finding fresh people to drain, since the ones it has used never return. So while the cheater is forever spending to capture new victims, the good-money builder is harvesting the compounding loyalty of everyone he has ever served well. Give it enough time, and trust simply out-earns exploitation. The head start of bad money is real, but it is short, and trust is the long game."},{"t":"p","s":"The second advantage is people, and it may be the most powerful of all. Good money can attract and keep the best people, and give them a reason to be wired in, because there is meaning in building something that genuinely helps the world. You can ask a person to pour their soul into work that lifts others. You cannot, in the same way, ask them to be gloriously obsessed with cheating strangers. Bad money's people are usually mercenaries, there for the money alone, and mercenaries leave, and they never give you their deepest fire. The good-money mission can light a fire in good people that no salary alone ever could, and a team of the wired-in, working for something they believe in, will out-build a team of mercenaries every single time."},{"t":"h","s":"Out-build them, do not out-cheat them"},{"t":"p","s":"So the strategy becomes clear, and it is important to say what it is not. We do not try to beat the bad-money competitor at his own game. We do not out-cheat the cheaters. That road loses twice, because they are better at cheating than we will ever be, and because walking it would turn us into them, which is to lose the only thing worth winning. Instead, we beat them at a different game entirely, the game they cannot play."},{"t":"p","s":"We out-build them. We make the better product, earn the deeper trust, and improve faster than they can. This last one matters enormously, and it is where everything we learned about the method comes home. The bad-money business usually coasts. It has trapped its customers, so it grows lazy, stops improving, and lives off the trap. The good-money builder cannot coast, because his customers are free to leave at any moment, so he must earn them again every single day. And that very pressure, the need to keep earning what could walk away, keeps him sharp, fast, and always improving. He ships version one, he runs his experiments, he gets a little better every week, and so his honest product quietly pulls ahead of the lazy dishonest one and stays a step ahead, forever. The discipline of having to earn it is the very thing that keeps him winning."},{"t":"p","s":"Picture two shops opening on the same street in the same month. The first lures people in with a price that is not quite honest, hides the real terms, and makes leaving difficult once you are in. For a while it races ahead, full of trapped customers and easy money. The second sells a fair thing at a fair price, treats every customer as someone it wants back, and fixes its weaknesses a little every week. At first it looks slower, plainer, less clever. But a year on, the trapped customers of the first shop have begun to escape and to warn everyone they know, while the second shop is quietly full of people who came back, and brought their friends, and trust it now with bigger and bigger things. The street did not reward the faster starter. It rewarded the one still improving and still trusted when the dust settled. That crossover, invisible at the start and decisive in the end, is the good money edge made real."},{"t":"h","s":"No compromise, and profitable"},{"t":"p","s":"We must be clear and unsentimental about one last thing, because good intentions that go bankrupt help no one. Good money must be profitable. This is not a book about losing nobly. It is a book about winning."},{"t":"p","s":"Choosing good money does not mean choosing poverty, or charity, or martyrdom. It means refusing to make your profit by draining people, and instead making it, often more of it, by genuinely serving them. The mission needs good money to be commercially powerful, not just morally pretty, because a good-money business that fails simply hands the field back to the bad-money one, and the people lose. So we hold both ends without flinching. No compromise on the good, and no apology for the profit. We intend to serve people so well that serving them is also the most profitable thing we could possibly do, and to prove, with results and not just words, that the highest road and the winning road can be the very same road."},{"t":"p","s":"Yes, it will cost more effort at the start. We should expect that, and prepare for it, and not be discouraged when the cheaters seem to sprint ahead in the early days. That early lead is the most predictable thing in the world, and so is what comes after, when trust compounds, when the best people gather, when the relentless improver pulls level and then ahead, and the easy gains of bad money begin to rot. The good-money builder plays the long game on purpose, and the long game belongs to him."},{"t":"p","s":"This is why we built this person. Not merely so that he could succeed, but so that the good could finally compete, and win, against the ruthless, without ever becoming ruthless itself. One such builder is a quiet force. But a whole company of them, all moving by these same principles, becomes something else entirely. And that is where we turn next, to what happens when an entire team, an entire company, adopts the way of the Ultra Neutral Growth Hacker as its very policy."}]},{"label":"Chapter 19","part":"Part Five · The Mission","title":"Chapter Nineteen — The Company Policy","words":1615,"blocks":[{"t":"p","s":"Everything we have built so far lives inside one person. One clear mind, one disciplined pair of hands. But a single Ultra Neutral Growth Hacker, however formidable, is still just one person, and the work we dream of doing in this world is far too big for one person. So we must ask the question that turns a personal philosophy into a real force. What happens when not one person, but a whole team, a whole company, lives this way?"},{"t":"p","s":"Something remarkable happens. The principles do not merely add up. They multiply. And that is why this way of working is not only a personal practice for us. It is a policy. It is the stated culture of how we build, together."},{"t":"h","s":"A culture, declared"},{"t":"p","s":"Most companies never decide, out loud, what kind of company they are. They let their culture form by accident, from whoever happens to be loudest, and they end up with politics, drift, and a thousand small compromises no one ever chose. We will not do that. We will simply declare it. We are Ultra Neutral Growth Hackers, and this is how we work."},{"t":"p","s":"There is enormous power in saying it plainly, because a declared culture does work that no manager ever could. It means we do not have to re-decide our values in every meeting, because they are already settled. It means a new person can learn, in a sentence, what we are about and how we move. It means that when the founder is not in the room, the standard still holds, because the standard does not live in one person, it lives in the shared policy that everyone carries. A culture you can name is a culture that can scale, survive, and spread. So we name ours, and we say it often, and we mean it. When the work begins, we remind ourselves of the simple agreement that governs us. Here, we follow the way of the ultra neutral growth hacker. Work is the priority. Results are the judge."},{"t":"h","s":"Loyal to results, not to politics"},{"t":"p","s":"The first thing you would notice, walking into a company built this way, is what is missing. The politics are missing."},{"t":"p","s":"In most organisations, an enormous amount of energy is wasted on things that have nothing to do with the work. People defend their turf, protect their ego, jockey for status, and cling to their own ideas because they are theirs. The best idea often loses to the most powerful person, and good work dies in the gap. A company of ultra neutral growth hackers refuses all of this, because every person in it has agreed to be loyal to results, not to their own importance. The best idea wins here, no matter who said it, no matter their rank, no matter how junior the voice. We catch our flinch, together. We disagree honestly and then commit fully. We kill the meeting that is only noise, ship the version one, decide at seventy percent, and run our experiments, all the things we learned as individuals, now moving as one body. A team that has stripped out the politics and pointed everyone at the result simply out-builds a team that is busy fighting itself, every single time."},{"t":"p","s":"Picture a single meeting in such a company. The most senior person proposes a plan, and the newest, most junior person quietly points out a flaw in it and offers a better idea. In most companies, that junior person would learn to stay silent, and the senior plan would proceed, flaw and all, because rank outranked truth. In ours, something different happens. The senior person feels the flinch, the small sting of being corrected by a newcomer, and then does the thing we have all agreed to do. She sets the flinch aside, looks honestly at the better idea, and says, you are right, let us do it your way. That one moment, repeated a thousand times across a company, is worth more than any strategy, because it means the best idea always wins, and everyone knows it is safe to speak it."},{"t":"h","s":"Neutral at work, united by the mission"},{"t":"p","s":"Here is the part that gives this culture its name, and it must be understood carefully, because it is easily misheard. In a company of ultra neutral growth hackers, the workplace itself is neutral."},{"t":"p","s":"This does not mean people leave their beliefs, their faith, or their identity at the door, and it certainly does not mean anyone is asked to hide who they are or be any less themselves. It means something gentler and more powerful. It means that while we are working, what unites us is the mission, and the divisions that split the outside world are simply set aside for that time. We do not bring the arguments of politics, religion, or ideology into the work, not because those things do not matter, but because, as we learned, everything has its time, and the work has its own time. Outside of work, every person honours whatever they hold sacred, fully and freely, and we respect it completely. Inside the work, we are all, for those hours, just builders pointed at the same goal."},{"t":"p","s":"This neutrality is not coldness. It is what allows people of every background, every belief, and every walk of life to build side by side without friction. The mission becomes the common ground that everyone can stand on together, and the work becomes a place of peace precisely because the battles of the wider world are left at its edge. A company united by a clear mission, and neutral about everything that would divide it, can hold a richer mix of people, working in deeper harmony, than any company organised around a single tribe ever could."},{"t":"h","s":"Intense, but human"},{"t":"p","s":"We do want intensity. We will not pretend otherwise. We admire the wired-in, mission-driven cultures of the great builders, the companies where people pour themselves into the work and achieve things the comfortable world calls impossible. We want that fire. We want a team that is genuinely obsessed with serving its people brilliantly, that moves fast, ships often, and holds a standard most places would find exhausting. A company of casual, clock-watching, half-present people will never change anything, and we intend to change a great deal."},{"t":"p","s":"But, and this is essential, we want the fed fire, not the flare. We learned as individuals that being wired in is not the same as burning out, and the same truth governs the company. An intensity that uses people up and throws them away is not strength, it is bad money pointed at your own team, and it betrays the very compass we live by. So our intensity is fuelled, not cruel. We protect our people's rest, their health, and their families, because we need them sharp for years, not sprinting for months and then broken. We ask for depth and fire during work's own time, and we guard the other times fiercely so that fire can be sustained. The aim is a team that is both intense and whole, that does the great work and goes home as people, not wreckage. That balance is harder to build than mere pressure, and it is the only kind of intensity that lasts."},{"t":"h","s":"Not for everyone, and that is right"},{"t":"p","s":"A culture this clear will not suit everyone, and we must be honest and even glad about that, because a culture that tries to fit everyone ends up being nothing at all."},{"t":"p","s":"The person who lives for office politics will not be happy here, because politics gets no traction. The person who wants to coast will not last, because results are visible. The person who wants to make bad money will find no home here, because the compass does not bend. This is not cruelty, it is clarity, and clarity is a kindness to everyone. When a culture is named plainly, the people who belong in it feel relief and recognition, and they pour themselves in, and the people who would be miserable in it can see that early and find somewhere better suited to them. A strong culture is defined as much by who it is not for as by who it is for, and we will not weaken ours by pretending it suits all. We will state it clearly, and trust the right people to recognise their home."},{"t":"p","s":"So this is the policy, and it is how everything in this book scales beyond a single person. We declare our culture instead of letting it form by accident. We stay loyal to results and refuse the waste of politics. We keep the workplace neutral so that the mission can unite a beautifully varied team. We burn with a fed fire, intense and human at once. And we hold our standard so clearly that the right people find us and the wrong fit moves on. A company that lives this way does not merely employ good people. It compounds them, until the whole becomes far greater than the sum of its disciplined parts. This is the way we intend to build, in our own work, in the movement we are growing, and in every venture still to come."},{"t":"p","s":"We have now followed this idea all the way from a single person to a whole company. But there is one last step, the most important of all, and without it everything in these pages remains only words on a page. A book, by itself, changes very little. The question that remains is how we take all of this, lift it off the page, and drive it down so deep into a life that it stops being something you know and becomes something you simply are. That is the final chapter, and it is the whole purpose behind the book. It is how knowing becomes breathing."}]},{"label":"Chapter 20","part":"Part Five · The Mission","title":"Chapter Twenty — From Knowing to Breathing","words":1522,"blocks":[{"t":"p","s":"You have reached the end of the book, and so you now know how the Ultra Neutral Growth Hacker thinks, works, holds the line, and builds. You know all twenty ideas. And I have to tell you something honest, here at the close, even though it might sound strange coming from the person who wrote all this. Knowing it is almost worthless."},{"t":"p","s":"Not because the ideas are weak. Because knowing, by itself, changes nothing. We learned this long ago, in the chapter on earning the result. A lesson understood and not lived is just a pleasant experience that fades by morning. And if all this book ever becomes for you is a set of ideas you understood and admired, then we have both failed, and the noise has won again, dressed this time as a finished book on your shelf. So in this final chapter, let us talk about the only thing that actually matters. How to take all of this off the page, and drive it so deep into your life that it stops being something you know, and becomes something you simply are. How knowing becomes breathing."},{"t":"h","s":"The four steps down"},{"t":"p","s":"There is a path that any piece of wisdom must travel to go from your head to your bones, and it has four steps. Almost everyone stops at the first, which is exactly why almost everyone stays the same."},{"t":"p","s":"The first step is to know it. You read, you understand, the idea makes sense. This is where this book has brought you, and it is necessary, but it is only the doorway. The second step is to do it. You take one idea and you actually try it in your real life. You run the signal audit. You ship a version one. You guard your first hour. Knowing becomes doing, and the moment it does, everything starts to change. The third step is to practise it until it becomes a habit. You do the thing again, and again, and again, until it stops requiring effort and willpower and simply becomes the way you operate. And the fourth step, the deepest one, is to become it. After enough practice, the thing is no longer something you do. It is who you are. You do not remind yourself to be neutral, you simply are neutral. You do not push yourself to cut the noise, you simply no longer hear it as you once did. The practice has become a person. The knowing has become breathing."},{"t":"p","s":"You do not think about breathing. It happens on its own, keeping you alive every moment, whether you attend to it or not. That is the goal for everything in this book. Not a set of techniques you effortfully remember, but a way of being that runs by itself, as natural and as constant as the breath. That is what we are really after. Not a reader who knows about the hacker, but a person who has become one."},{"t":"h","s":"Why a book is not enough"},{"t":"p","s":"And here is the honest admission that this final chapter is built around. A book, by itself, cannot carry you down all four of those steps. It can do the first beautifully. It can even inspire the second. But a book cannot stand beside you every morning while you build the habit, cannot catch you when you drift, cannot hold you to your word over the months it takes for doing to become being. No book can. And any book that pretends it can is selling you the comfortable illusion of change instead of the real, harder thing."},{"t":"p","s":"So a book, used well, is not the whole house. It is the door. It is a conveyor of knowledge, and once the knowledge is delivered, everything else must come to support it, or the knowledge simply fades the way all unused knowledge fades. This is why, for us, a book is only ever the beginning of something larger. Around this book there must grow the things that carry you past mere knowing. A workbook, to turn the ideas into your own first actions. Tools and an app, to help you run the audits and keep the rituals alive day after day. A community, so you are not doing this alone in the dark, but among others walking the same path, who will hold you to the standard when your own resolve wavers. And deeper trainings, for those who want to go all the way down into it, and be coached, and become it fully."},{"t":"p","s":"None of that is extra. It is the soil, the water, and the sun around the seed this book has planted. The seed alone, dropped on hard ground and left, mostly dies. The same seed, given soil and water and light, becomes a living thing. We did not write a book so you could know these ideas. We built a path so you could become them, and the book is simply the first and most important step on it."},{"t":"h","s":"One breath at a time"},{"t":"p","s":"Now let me protect you from the most common way this goes wrong, because in your enthusiasm you may be about to make it. Do not try to install all twenty ideas at once. You will fail, and worse, the failure will tempt you to abandon all of them."},{"t":"p","s":"We learned the better way already. Take one. Choose the single idea from this book that your life most needs right now, just one, and install only that, until it has travelled all four steps and become as natural as breathing. Then come back, and take the next. This is slow, and the slowness is exactly why it works, because slow is how habits become permanent, and permanent is the whole point. A person who truly installs one idea a season has, in a few years, quietly become an entirely different human being, while the person who tried to swallow all twenty at once is, a few weeks later, exactly who he always was. Mastery is not a flood. It is one breath, and then the next, and then the next."},{"t":"h","s":"The person you are becoming"},{"t":"p","s":"Let yourself imagine, for a moment, who you will be once these things have become your breathing, because it is worth wanting clearly."},{"t":"p","s":"You will be calm in a world that is anxious, because the noise that rules other people no longer rules you. You will be fast where others are frozen, deciding and shipping while they wait to feel ready. You will be free of the thousand loyalties that weigh others down, owned by nothing but the truth and your own clear goal. You will build things that genuinely help people, and grow wealthy doing it, with a conscience perfectly clean. You will go deep where others stay shallow, and reach the treasures that only the wired-in ever touch. You will be, in the oldest and best sense of the word, a builder. A driver who finally has both hands on the wheel of a powerful machine, who knows exactly where he is going, and who is no longer drifting wherever the road happens to tilt. That person is not a fantasy. That person is simply you, with these few things turned from knowing into breathing. And the only thing standing between you and him is the practice."},{"t":"h","s":"Where you go from here"},{"t":"p","s":"So we arrive, at the very end, back at the beginning. Do you remember? It was two o'clock. The noise was rising, and you had a choice, to spend the next hour as you spent yesterday's, or to turn the page and begin to build. You turned the page. You read the whole book. And now the real work, the only work that was ever going to change anything, begins. Not the knowing. The becoming."},{"t":"p","s":"And here is the last thing, the most important thing, and it is a kind of promise. You do not have to do this alone. The hardest part of becoming anything is doing it in isolation, with no one beside you who understands, no one to hold you to your word, no one building the same thing in the next room. So we built a place for exactly that. Beyond this book there is a living movement of people walking this same path, learning to future-proof their lives, building good money together, holding one another to the standard, and refusing, side by side, to be ruled by the noise. That is where the workbook, the tools, the community, and the trainings all live, and it is where this book was always quietly leading. When you are ready to turn knowing into becoming, come and find us, and join us, and build. The door is open, and there are people on the other side of it who have been waiting for someone exactly like you."},{"t":"p","s":"You came to this book a reader. You may leave it a builder. The noise is rising, as it always does, and the choice, as it always was, is entirely yours. You can close this book and let everything in it fade by morning. Or you can take one idea, just one, and begin, today, to breathe it. Turn the page. Begin to build. We will be there when you arrive."}]}],"totalWords":32778};
var P = DATA.pieces;
var $ = function(s,r){return (r||document).querySelector(s)};
var synth = window.speechSynthesis;
var cur = -1, idx = 0, playing = false, rate = 1, curUtter = null, units = [], spans = [];
var speeds = [1,1.25,1.5,2,3,0.75];
var fs = parseInt(localStorage.getItem('ungh_fs')||'0',10);

function lsGet(k,d){var v=localStorage.getItem(k);return v===null?d:v}
function noteKey(i){return 'ungh_note_'+i}
function readKey(i){return 'ungh_read_'+i}

// ---- build TOC ----
function buildTOC(){
  var toc = $('#toc'); toc.innerHTML='';
  var lastPart='';
  P.forEach(function(p,i){
    if(p.part!==lastPart){ var h=document.createElement('h3'); h.textContent=p.part; toc.appendChild(h); lastPart=p.part; }
    var row=document.createElement('div'); row.className='row'; row.dataset.i=i;
    if(localStorage.getItem(noteKey(i))) row.classList.add('hasnote');
    if(localStorage.getItem(readKey(i))) row.classList.add('read');
    row.innerHTML='<span class="chk">'+(localStorage.getItem(readKey(i))?'&#10003;':'')+'</span>'+
      '<span class="lab"><b>'+p.label+'</b><span>'+esc(p.title)+' &middot; '+p.words+' words</span></span>'+
      '<span class="dot"></span>';
    row.addEventListener('click',function(){ open(parseInt(this.dataset.i,10)); if(window.innerWidth<=880) toc.classList.remove('show'); });
    toc.appendChild(row);
  });
  // roadmap
  var road=document.createElement('div'); road.className='road'; road.id='road';
  road.innerHTML='<h3 style="color:var(--gold)">Roadmap to Publish</h3>';
  ROAD.forEach(function(it,k){
    var done=lsGet('ungh_road_'+it.id, it.done?'1':'')==='1';
    var l=document.createElement('label'); if(done)l.className='done';
    l.innerHTML='<input type="checkbox" data-id="'+it.id+'" '+(done?'checked':'')+'> '+it.t;
    l.querySelector('input').addEventListener('change',function(){
      localStorage.setItem('ungh_road_'+this.dataset.id,this.checked?'1':'0');
      l.className=this.checked?'done':'';
    });
    road.appendChild(l);
  });
  toc.appendChild(road);
}

  {id:'docx',t:'Manuscript .docx assembled',done:true},

  {id:'edit',t:'Fine-edit / listen pass',done:false},
  {id:'cover',t:'Cover design',done:false},
  {id:'kdp',t:'KDP listing (title, blurb, keywords, categories)',done:false},
  {id:'format',t:'Print + ebook format',done:false},
  {id:'workbook',t:'Workbook',done:false},
  {id:'app',t:'App',done:false},
  {id:'community',t:'Community / FPL funnel',done:false},
];

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function splitSents(t){ return (t.match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[t]).map(function(x){return x.trim()}).filter(Boolean) }

// ---- hero ----
function hero(){
  cur=-1; stop();
  $('#main').innerHTML='<div class="hero"><div class="ptitle">Future Proofing Lifestyle</div>'+
    '<h1>Ultra Neutral Growth Hacker</h1>'+
    '<div class="sub">Cut the Noise. Skip the Steps. Build Good Money.</div>'+
    '<div class="meta">'+P.length+' pieces &middot; '+DATA.totalWords.toLocaleString()+' words &middot; full draft complete<br>'+
    'Pick a chapter on the left to listen, read, and jot edits.</div></div>';
  markActive();
}

// ---- open a piece ----
function open(i){
  stop(); cur=i; idx=0; var p=P[i];
  units=[];
  p.blocks.forEach(function(b){
    if(b.t==='h'){ units.push({sub:true,s:b.s}); }
    else { splitSents(b.s).forEach(function(s){ units.push({sub:false,s:s}); }); }
  });
  var m=$('#main');
  m.innerHTML=''+
    '<div class="ptitle">'+esc(p.part)+'</div>'+
    '<h2 class="ct">'+esc(p.title)+'</h2>'+
    '<div class="player">'+
      '<div class="bar" id="bar"><div class="fill" id="fill"></div><div class="knob" id="knob"></div></div>'+
      '<div class="ctrls">'+
        '<button class="pbtn" id="restart" title="Restart">&#8634;</button>'+
        '<button class="pbtn" id="prev" title="Previous">&#9198;</button>'+
        '<button class="pbtn play" id="play" title="Play">&#9654;</button>'+
        '<button class="pbtn" id="next" title="Next">&#9197;</button>'+
        '<button class="pbtn" id="speed" title="Speed" style="font-size:13px">1&times;</button>'+
      '</div>'+
      '<div class="pmeta"><span id="pos">Ready</span><span>'+p.words+' words &middot; ~'+Math.round(p.words/155)+' min</span></div>'+
    '</div>'+
    '<div class="tr" id="tr" style="font-size:'+(18+fs)+'px"></div>'+
    '<div class="notes"><h4>My notes &amp; edits for this chapter</h4><textarea id="note" placeholder="Type corrections here. They save automatically. Use “Copy all notes” up top to send them back."></textarea></div>'+
    '<div class="pager"><button class="btn" id="pp">&#8592; Previous</button>'+
      '<label style="display:flex;gap:8px;align-items:center;font-size:14px"><input type="checkbox" id="readck"> Mark as read</label>'+
      '<button class="btn" id="pn">Next &#8594;</button></div>';
  var tr=$('#tr'); spans=[];
  units.forEach(function(u,k){
    var sp=document.createElement('span'); sp.className='s'+(u.sub?' sub':''); sp.textContent=u.s+' ';
    sp.addEventListener('click',function(){ jump(k); });
    tr.appendChild(sp); spans.push(sp);
  });
  // notes
  var note=$('#note'); note.value=localStorage.getItem(noteKey(i))||'';
  note.addEventListener('input',function(){ localStorage.setItem(noteKey(i),this.value); refreshRow(i); });
  // read checkbox
  var rc=$('#readck'); rc.checked=!!localStorage.getItem(readKey(i));
  rc.addEventListener('change',function(){ if(this.checked)localStorage.setItem(readKey(i),'1'); else localStorage.removeItem(readKey(i)); refreshRow(i); });
  // controls
  $('#play').addEventListener('click',toggle);
  $('#restart').addEventListener('click',function(){ jump(0); });
  $('#prev').addEventListener('click',function(){ jump(idx-1); });
  $('#next').addEventListener('click',function(){ jump(idx+1); });
  $('#speed').addEventListener('click',function(){ rate=speeds[(speeds.indexOf(rate)+1)%speeds.length]; this.innerHTML=rate+'&times;'; if(playing)speak(idx); });
  $('#bar').addEventListener('click',function(e){ var r=this.getBoundingClientRect(); jump(Math.round(Math.min(1,Math.max(0,(e.clientX-r.left)/r.width))*(units.length-1))); });
  $('#pp').addEventListener('click',function(){ if(cur>0)open(cur-1); });
  $('#pn').addEventListener('click',function(){ if(cur<P.length-1)open(cur+1); });
  localStorage.setItem('ungh_last',i);
  render(); markActive(); window.scrollTo(0,0);
}

function refreshRow(i){
  var row=$('.row[data-i="'+i+'"]'); if(!row)return;
  row.classList.toggle('hasnote',!!localStorage.getItem(noteKey(i)));
  var read=!!localStorage.getItem(readKey(i));
  row.classList.toggle('read',read);
  row.querySelector('.chk').innerHTML=read?'&#10003;':'';
}
function markActive(){ document.querySelectorAll('.row').forEach(function(r){ r.classList.toggle('active', parseInt(r.dataset.i,10)===cur); }); }

// ---- player (locked One Mantra engine: sentence-by-sentence) ----
function render(){
  var f=$('#fill'),k=$('#knob'),pos=$('#pos'); if(!f)return;
  var frac=units.length<=1?0:idx/(units.length-1);
  f.style.width=(frac*100)+'%'; k.style.left=(frac*100)+'%';
  pos.textContent=(playing?'Playing ':'Sentence ')+(idx+1)+' / '+units.length;
  spans.forEach(function(s,i){ s.classList.toggle('cur',i===idx); });
  var c=spans[idx]; if(c){ var y=c.getBoundingClientRect().top; if(y<120||y>window.innerHeight-80) c.scrollIntoView({block:'center',behavior:'smooth'}); }
  var pb=$('#play'); if(pb) pb.innerHTML=playing?'&#10074;&#10074;':'&#9654;';
}
function speak(i){
  synth.cancel(); idx=Math.max(0,Math.min(i,units.length-1));
  var u=new SpeechSynthesisUtterance(units[idx].s); u.rate=rate; u.lang='en-US';
  u.onend=function(){ if(u!==curUtter)return; if(idx<units.length-1)speak(idx+1); else { playing=false; render(); } };
  curUtter=u; synth.speak(u); playing=true; render();
}
function toggle(){ if(playing){ curUtter=null; synth.cancel(); playing=false; render(); } else { speak(idx); } }
function jump(i){ var was=playing; curUtter=null; synth.cancel(); idx=Math.max(0,Math.min(i,units.length-1)); if(was)speak(idx); else { playing=false; render(); } }
function stop(){ curUtter=null; if(synth)synth.cancel(); playing=false; }

// ---- topbar ----
$('#menuBtn').addEventListener('click',function(){ $('#toc').classList.toggle('show'); });
$('#theme').addEventListener('click',function(){ document.body.classList.toggle('light'); var l=document.body.classList.contains('light'); localStorage.setItem('ungh_theme',l?'light':'dark'); this.innerHTML=l?'&#9789; Dark':'&#9788; Light'; });
$('#fup').addEventListener('click',function(){ fs=Math.min(10,fs+2); localStorage.setItem('ungh_fs',fs); var tr=$('#tr'); if(tr)tr.style.fontSize=(18+fs)+'px'; });
$('#fdown').addEventListener('click',function(){ fs=Math.max(-6,fs-2); localStorage.setItem('ungh_fs',fs); var tr=$('#tr'); if(tr)tr.style.fontSize=(18+fs)+'px'; });
$('#copyNotes').addEventListener('click',function(){
  var out=[]; P.forEach(function(p,i){ var n=localStorage.getItem(noteKey(i)); if(n&&n.trim()) out.push('### '+p.label+' — '+p.title+'\n'+n.trim()); });
  var txt=out.length?('Ultra Neutral Growth Hacker — my edits\n\n'+out.join('\n\n')):'(no notes yet)';
  navigator.clipboard.writeText(txt).then(function(){ this&&0; alert('Copied '+out.length+' chapter note(s). Paste them back to Claude.'); }).catch(function(){ prompt('Copy your notes:',txt); });
});
window.addEventListener('pagehide',stop);

if(localStorage.getItem('ungh_theme')==='light'){ document.body.classList.add('light'); $('#theme').innerHTML='&#9789; Dark'; }
buildTOC();
var last=localStorage.getItem('ungh_last');
if(last!==null && P[+last]) open(+last); else hero();
</script>
