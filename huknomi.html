, and to place that light into as many hands as possible.\n\nHe does not write from a pedestal. He writes as a report from the trenches. Still climbing. Still learning. And reaching back.\n\nBecause somewhere, right now, someone is standing at the same edge he once stood on — about to believe that money is the measure of a man. This book exists so they do not have to fall as far to discover the truth.\n\nHe keeps the price of his own Golden Ticket deliberately small. Everything he earns beyond it, he has given to a single aim: to solve real problems with Good Money — and to help raise not one founder, but thousands. Ordinary people who, once they reach their own Golden Platform, launch from it to mend something larger than themselves.\n\nThat is the world he is building toward. A quiet, growing company of Hu-Kno-Mians who, freed at last from the scramble to survive, stop asking \"how do I get by?\" and start asking \"what can I fix?\" — who meet each problem not as a burden but as an opening, and find, in the solving of it, a rare and lasting joy.\n\nBecause once a person stands on clean ground, with honest money and time that is finally their own — what is left to stop them from healing some corner of the world?\n\nHu-Kno-Mi is not a conclusion. It is a seed — placed in one life, to be carried into many.\n\n• • •","hasv1":true},{"label":"Back matter","title":"Where to Go Next","words":330,"text":"You now hold the whole of it — the why, the how, the mission, and the moment. There is nothing missing from the toolkit, and no list you must finish before you are allowed to begin. You can begin today, exactly as you are, with exactly what you have.\n\nBut the road is long, and some readers like company on it. So if, somewhere along the way, you find you want to go deeper into one corner or another, know that a few companion books wait quietly for you — not in any fixed order, each one leading, in the end, back to the same Mission:\n\n**Heights of Ignorance** — a clear-eyed map of how far the dark can reach, and a way to recognise exactly which rung you happen to be standing on right now.\n\n**Heights of Knowledge** — its upward mirror: the climb back out, hold by hold, and how to reach down and help the next person up.\n\n**Good Money, Bad Money** — the full and careful telling of the single choice this whole book turns on: how the very same money becomes a blessing or a wound, entirely in the way it is earned.\n\n**Transkeyer** — the four keys that turn understanding into a new self: what you feed on, the company you keep, the habits you build, and the truth you teach forward.\n\nHu-Kno-Mi is the heart of the Future Proofing Lifestyle network — a place where financial freedom comes first, and where every path, sooner or later, leads back to the Mission. And when you are ready not merely to read but to *begin* — with tools in hand and others walking the same road beside you — the network is where that starts. Step in at **ffgm.kit.com/44df2b86f7**.\n\nWhichever book you reach for next, and whenever you reach for it, the work is always the same, and always close at hand:\n\nEducate. Empower. Enlighten.\n\nCarry the light to whoever stands in front of you.","punchy":"You now hold the whole of it —\n\nThe why.\n\nThe how.\n\nThe mission.\n\nThe moment.\n\nThere is nothing missing.\n\nThere is nothing you must finish before you begin.\n\nYou can start now — exactly as you are, with exactly what you have.\n\n---\n\nBut the road is long.\n\nAnd some prefer to walk it with deeper maps.\n\nIf that is you, a few paths wait quietly ahead — not in order, not as requirements, but as extensions of the same truth:\n\n---\n\n**Heights of Ignorance**\n\nA clear-eyed descent into how deep the darkness goes — and the exact place you may be standing in it right now.\n\n---\n\n**Heights of Knowledge**\n\nThe climb back out — step by step — and how to reach down and lift another as you rise.\n\n---\n\n**Good Money, Bad Money**\n\nThe full unfolding of the single choice this book turns on — how the same money becomes healing or harm, entirely in the way it is earned.\n\n---\n\n**Transkeyer**\n\nThe four keys that turn understanding into a new self — what you feed on, who you keep company with, the habits you build, and the truth you teach forward.\n\n---\n\nHu-Kno-Mi is not just a book.\n\nIt is the heart of the Future Proofing Lifestyle.\n\nA place where financial freedom begins —\n\nAnd where every path, sooner or later, leads back to the same mission.\n\n---\n\nAnd when you are ready not just to read, but to begin —\n\nwith tools, with people walking the same road —\n\nthe Future Proofing Lifestyle network is where it lives.\n\nStep in at: ffgm.kit.com/44df2b86f7\n\n---\n\nEducate.\n\nEmpower.\n\nEnlighten.\n\n---\n\nCarry the light.\n\nTo whoever stands in front of you.","haspunchy":true,"shaker":"You now hold the whole of it — the why, the how, the mission, and the moment.\n\nThere is nothing missing from the toolkit. And there is no list you must finish before you are allowed to begin.\n\nYou can begin today. Exactly as you are, with exactly what you have.\n\nBut the road ahead is long. And no one walks a long road well alone.\n\nAt some point — not out of confusion, but out of growth — you may feel the need to go deeper. To sharpen one edge. To strengthen one part of the climb.\n\nWhen that moment comes, know this: you are not starting something new. You are simply going further into the same truth.\n\nSo a few companion books wait for you — not as separate ideas, but as different doors into the same house. Take whichever door calls you.\n\n---\n\n**Heights of Ignorance** — not to judge, but to see clearly.\n\nHow ignorance actually operates in the real world: how it hides, justifies, and repeats itself, and how to recognise, without illusion, where you stand right now. Because you cannot rise above what you cannot see.\n\n**Heights of Knowledge** — the upward path, step by step.\n\nNot theory, but lived elevation: how a person actually climbs — in thinking, in earning, in living — and how one steady human being becomes a handhold for another. Because knowledge, when real, always lifts more than one life.\n\n**Good Money, Bad Money** — the sharpest edge of the Compass.\n\nA deeper, clearer look at the one place most lives turn: how we earn. Real examples, real choices, real consequences. Because the difference between healing and harm is rarely in the money itself — but always in the way it is made.\n\n**Transkeyer** — where understanding becomes transformation.\n\nThe four forces that shape a human life: what you consume, who you stand with, what you repeat, and what you pass forward. Because knowing is not enough — life changes only when knowledge becomes structure.\n\n---\n\nAll of this lives within a single ecosystem. Not a collection of books — a pathway.\n\nAnd Hu-Kno-Mi is the heart of the Future Proofing Lifestyle: a place where financial freedom is built step by step, where clean earning is practised and not just discussed, and where no one walks the road alone.\n\nThis book has a home of its own. There you can read every page — or listen to the whole audiobook — free, with nothing to buy and no sign-up to begin. Read it, hear it, and share it with anyone, at huknomi.com.\n\nHere is the part that surprises people most.\n\nThis is not a marketplace. It is a movement.\n\nThese books were never written to make money. They are guiding lights — and a light is meant to be given, not sold. So you are not a customer here. You are invited to become a volunteer: one of a growing many who have chosen to know better, earn cleaner, live freer — and then turn and lift the next person.\n\nIt costs nothing to begin. It asks only that, once you have risen a little, you reach back a hand.\n\nSo when you are ready — not just to understand, but to begin, with others walking beside you — step in here:\n\nfutureproofinglifestyle.com\n\nhuknomi.com\n\nJoin free. Take your place. You will not walk alone again.\n\n---\n\nAnd wherever you are on the road, walk with us in between.\n\nThe ideas of this book, in motion — youtube.com/@Hu-Kno-Mi\n\nThe movement, the community, the daily work — youtube.com/@FutureProofingLifestyle\n\n---\n\nNo pressure. No timing. But understand this quietly: every day you delay, you are still choosing a direction. So choose it consciously.\n\nWhichever book you reach for next — and whenever you reach for it — the work never changes. It is always close. Always immediate. Always yours to act on.\n\nEducate.\n\nEmpower.\n\nEnlighten.\n\nKnow better. Earn better. Live better.\n\nAnd carry the light to whoever stands in front of you.","hasshaker":true,"front":false,"v1":"You now hold the whole of it — the why, the how, the mission, and the moment.\n\nThere is nothing missing from the toolkit. And there is no list you must finish before you are allowed to begin. You can begin today. Exactly as you are, with exactly what you have.\n\nBut the road ahead is long. And no one walks a long road well alone.\n\nAt some point — not out of confusion, but out of growth — you may feel the need to go deeper. Not into more pages, but into practice: to live this beside others walking the same road, and to discover that a long road is far easier walked in company. When that moment comes, know this: you are not starting something new. You are simply going further into the same truth.\n\nAnd there is a home for all of this — a living pathway, not a shelf of reading.\n\nHu-Kno-Mi sits at the heart of the Future Proofing Lifestyle: a place where financial freedom is built step by step, where clean earning is practised and not just discussed, and where no one walks the road alone.\n\nThis book has a home of its own. There you can read every page — or listen to the whole audiobook — free, with nothing to buy and no sign-up to begin. Read it, hear it, and share it with anyone, at huknomi.com.\n\nHere is the part that surprises people most. This function slotsFor(i){var b=(IMG[i]||[]).slice(),a=imgAdded[i]||[];for(var k=0;k<a.length;k++)if(b.indexOf(a[k])<0)b.push(a[k]);return b;}
function imgRemove(s){imgRemoved[s]=1;imgSave();renderPiece();}
function imgRestore(s){delete imgRemoved[s];imgSave();renderPiece();}
function imgAdd(i){var sel=document.getElementById('imgAddSel');if(!sel||!sel.value)return;if(!imgAdded[i])imgAdded[i]=[];if(imgAdded[i].indexOf(sel.value)<0)imgAdded[i].push(sel.value);delete imgRemoved[sel.value];imgSave();renderPiece();}
function copyImgChoices(){
  var kept=[],removed=[],added=[],NL=String.fromCharCode(10);
  for(var i=0;i<BOOK.length;i++){ var base=IMG[i]||[],add=imgAdded[i]||[];
    for(var j=0;j<base.length;j++){ (imgRemoved[base[j]]?removed:kept).push(base[j]); }
    for(var k=0;k<add.length;k++){ if(!imgRemoved[add[k]]) added.push(add[k]+' -> '+(BOOK[i].label||i)); }
  }
  var t=['HU-KNO-MI — IMAGE CHOICES (paste to Claude)','Kept '+kept.length+', removed '+removed.length,'','KEEP:'].concat(kept,['','REMOVE:'],removed.length?removed:['(none)'],['','ADDED / MOVED:'],added.length?added:['(none)']).join(NL);
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){alert('Image choices copied — paste back to Claude.');},function(){prompt('Copy:',t);});}else prompt('Copy:',t);
}
function imgCount(){var n=0;for(var i=0;i<BOOK.length;i++){var s=slotsFor(i);for(var j=0;j<s.length;j++)if(!imgRemoved[s[j]])n++;}return n;}
function renderImages(i,mode){
  var slots=slotsFor(i),live=[],gone=[];
  for(var x=0;x<slots.length;x++){ (imgRemoved[slots[x]]?gone:live).push(slots[x]); }
  var h='';
  for(var j=0;j<live.length;j++){ var s=live[j];
    h+='<figure class="imgfig"><div class="imgtools"><button class="imgrm" onclick="imgRemove(\''+s+'\')" title="Remove from book">&#10005;</button></div>'
     +'<img src="'+IMGDIR+s+'-'+mode+'.jpeg" alt="'+esc(IMGT[s]||s)+'" loading="lazy">'
     +'<figcaption>'+esc(IMGT[s]||s)+' &middot; <span style="opacity:.65">'+mode+'</span></figcaption></figure>';
  }
  var t='<div class="imgadd">';
  for(var g=0;g<gone.length;g++){ t+='<button class="imgchip" onclick="imgRestore(\''+gone[g]+'\')" title="Restore to book">&#8634; '+esc(IMGT[gone[g]]||gone[g])+'</button>'; }
  t+='<select id="imgAddSel"><option value="">+ add an image here…</option>';
  var ks=Object.keys(IMGT); for(var z=0;z<ks.length;z++) t+='<option value="'+ks[z]+'">'+esc(IMGT[ks[z]])+'</option>';
  t+='</select><button class="imgaddbtn" onclick="imgAdd('+i+')">Add</button></div>';
  return h+t;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(s){return esc(s).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\*([^*]+)\*/g,'<i>$1</i>');}
function plain(s){return s.replace(/\*\*?/g,'');}
function has(i,v){var V=VERS[v]; return V.has===null ? true : !!BOOK[i][V.has];}
function txt(i,v){return BOOK[i][VERS[v].key]||'';}
function wc(t){ if(!t) return 0; var s=t.replace(/[*#>]/g,' ').replace(/-{3,}/g,' '); var m=s.split(/\s+/).filter(function(w){return /[A-Za-z0-9]/.test(w);}); return m.length; }
function dkey(){return 'hkm3_done_'+ver+'_'+idx;}
function nkey(){return 'hkm3_note_'+ver+'_'+idx;}

function applyTheme(){var l=localStorage.getItem('hkm3_theme')==='light';document.body.classList.toggle('light',l);document.getElementById('themebtn').innerHTML=l?'&#9790;':'&#9728;';}
function toggleTheme(){localStorage.setItem('hkm3_theme',localStorage.getItem('hkm3_theme')==='light'?'dark':'light');applyTheme();}

function buildTabs(){
  var h='';
  for(var v=0;v<VERS.length;v++){
    var n=0; for(var i=0;i<BOOK.length;i++) if(has(i,v)) n++;
    h+='<button class="tab'+(v===ver?' on':'')+'" onclick="setVer('+v+')">'+VERS[v].name+'<span class="mini"> &middot; '+n+'</span></button>';
  }
  document.getElementById('tabs').innerHTML=h;
}
function buildTOC(){
  var h='<div class="toctitle">Chapters</div>';
  for(var i=0;i<BOOK.length;i++){
    var c=BOOK[i], done=localStorage.getItem('hkm3_done_'+ver+'_'+i)==='1', avail=has(i,ver);
    h+='<div class="tocrow'+(i===idx?' active':'')+(done?' done':'')+'" onclick="openCh('+i+')">'
     + '<input type="checkbox" '+(done?'checked':'')+' onclick="event.stopPropagation();toggleDone('+i+',this.checked)">'
     + '<span class="tt"><span class="lab">'+esc(c.label)+'</span><span class="ttx">'+esc(c.title.replace(/^[^—]*—\s*/,''))+'</span></span>'
     + (avail?'<span style="margin-left:auto;padding-left:8px;font-size:11px;color:var(--soft);white-space:nowrap">'+wc(txt(i,ver)).toLocaleString()+'w</span>':'<span class="miss">— not yet</span>')
     + '</div>';
  }
  document.getElementById('toc').innerHTML=h;
}
function toggleDone(i,on){ localStorage.setItem('hkm3_done_'+ver+'_'+i, on?'1':'0'); buildTOC(); updateStat(); }
function updateStat(){
  var n=0,d=0; for(var i=0;i<BOOK.length;i++){ if(has(i,ver)){n++; if(localStorage.getItem('hkm3_done_'+ver+'_'+i)==='1')d++;} }
  document.getElementById('stat').innerHTML='<b style="color:var(--gold2)">'+VERS[ver].name+'</b> &middot; '+n+' / '+BOOK.length+' written &middot; '+d+' ticked'+(VERS[ver].img?(' &middot; '+imgCount()+' images'):'');
}

function renderPiece(){
  stop();
  var inner=document.getElementById('inner'); sents=[]; si=0;
  var c=BOOK[idx];
  var _raw = c.front ? (c.text||'') : (has(idx,ver)? txt(idx,ver) : '');
  var _w = wc(_raw);
  var meta = (c.front ? 'front &amp; back matter' : (VERS[ver].name+' edition')) + (_w ? ' &middot; ' + _w.toLocaleString() + ' words' : '');
  var head='<h1 class="sec">'+esc(c.title)+'</h1><div class="secmeta">'+meta+'</div>';
  var body;
  if(c.front){ body = renderProse(c.text); }
  else if(!has(idx,ver)){ inner.innerHTML=head+'<div class="none">No '+VERS[ver].name+' version of this piece yet.</div>'; document.getElementById('counter').textContent='– / –'; setProg(); return; }
  else { var _imgs=(VERS[ver].img)?renderImages(idx,VERS[ver].img):''; body = _imgs + ((ver===0) ? renderProse(txt(idx,ver)) : renderBeats(txt(idx,ver))); }
  inner.innerHTML = head + body;
  bindSnts();
  document.getElementById('counter').textContent = sents.length ? ('1 / '+sents.length) : '– / –';
  setProg();
  document.getElementById('inner').parentElement.scrollTop=0; try{updateStat();}catch(e){}
}
function renderBeats(t){
  var out='', lines=t.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){ var ln=lines[i].trim(); if(!ln)continue;
    var bim=ln.match(/^!\[(.*?)\]\((.*?)\)$/); if(bim){ out+='<figure><img src="'+bim[2]+'" alt="'+esc(bim[1])+'" loading="lazy"></figure>'; continue; }
    if(/^-{3,}$/.test(ln)){ out+='<p class="pdiv">&middot; &middot; &middot;</p>'; continue; }
    if(/^\*\*(.+)\*\*$/.test(ln)){ out+='<p class="h2sub">'+esc(ln.replace(/^\*\*|\*\*$/g,''))+'</p>'; continue; }
    if(/^>\s?/.test(ln)){ var q=ln.replace(/^>\s?/,''); if(!q)continue; var kq=sents.length; sents.push(plain(q)); out+='<p class="beat quote"><span class="snt" data-i="'+kq+'">'+md(q)+'</span></p>'; continue; }
    var k=sents.length; sents.push(plain(ln));
    out+='<p class="beat"><span class="snt" data-i="'+k+'">'+md(ln)+'</span></p>';
  }
  return out;
}
function renderProse(t){
  var out='', lines=t.split(/\r?\n/);
  for(var n=0;n<lines.length;n++){ var ln=lines[n].trim(); if(!ln)continue;
    if(/^-{3,}$/.test(ln)) continue;
    var im=ln.match(/^!\[(.*?)\]\((.*?)\)$/);
    if(im){ var k=sents.length; sents.push('Diagram. '+plain(im[1])); out+='<figure><img src="'+im[2]+'" alt="'+esc(im[1])+'"><figcaption><span class="snt" data-i="'+k+'">'+esc(im[1])+'</span></figcaption></figure>'; continue; }
    if(/^##\s+/.test(ln)){ var hx=ln.replace(/^##\s+/,''); var k2=sents.length; sents.push(plain(hx)); out+='<p class="h2sub"><span class="snt" data-i="'+k2+'">'+md(hx)+'</span></p>'; continue; }
    if(/^>\s?/.test(ln)){ var q=ln.replace(/^>\s?/,''); if(!q)continue; var k3=sents.length; sents.push(plain(q)); out+='<p class="quote"><span class="snt" data-i="'+k3+'">'+md(q)+'</span></p>'; continue; }
    var parts=ln.match(/[^.!?]+[.!?]+(?:["')’”]+)?|[^.!?]+$/g)||[ln];
    out+='<p>';
    for(var p=0;p<parts.length;p++){ var s=parts[p].trim(); if(!s)continue; var ki=sents.length; sents.push(plain(s)); out+='<span class="snt" data-i="'+ki+'">'+md(s)+'</span> '; }
    out+='</p>';
  }
  return out;
}
function bindSnts(){ var a=document.querySelectorAll('.snt'); for(var i=0;i<a.length;i++) a[i].onclick=function(){ si=parseInt(this.getAttribute('data-i'),10); if(playing) speak(); else hi(); }; }
function hi(){ var a=document.querySelectorAll('.snt'); for(var i=0;i<a.length;i++) a[i].classList.remove('on'); var e=document.querySelector('.snt[data-i="'+si+'"]'); if(e){ e.classList.add('on'); if(playing) e.scrollIntoView({block:'center',behavior:'smooth'}); } document.getElementById('counter').textContent=(sents.length?(si+1):'–')+' / '+(sents.length||'–'); setProg(); }
function setProg(){ document.getElementById('pfill').style.width=(sents.length?((si+(playing?0.5:0))/sents.length*100):0)+'%'; }

/* TTS */
function stop(){ playing=false; try{speechSynthesis.cancel();}catch(e){} utt=null; document.getElementById('btnPlay').innerHTML='&#9654; Play'; }
function speak(){ try{speechSynthesis.cancel();}catch(e){} if(!sents.length)return; var u=new SpeechSynthesisUtterance(sents[si]); u.rate=RATES[ri]; if(voice)u.voice=voice; utt=u;
  u.onend=function(){ if(u!==utt)return; if(si<sents.length-1){ si++; hi(); speak(); } else { stop(); hi(); } };
  playing=true; document.getElementById('btnPlay').innerHTML='&#10074;&#10074; Pause'; speechSynthesis.speak(u); hi(); }
function togglePlay(){ if(!sents.length)return; if(playing){ stop(); } else { speak(); } }

function openCh(i){ saveNote(); idx=i; localStorage.setItem('hkm3_idx',i); buildTOC(); renderPiece(); loadNote(); }
function setVer(v){ saveNote(); ver=v; localStorage.setItem('hkm3_ver',v); buildTabs(); buildTOC(); updateStat(); renderPiece(); loadNote(); }
function pg(d){ var n=idx+d; if(n<0||n>=BOOK.length)return; openCh(n); }

/* notes */
function loadNote(){ document.getElementById('notes').value=localStorage.getItem(nkey())||''; document.getElementById('sv').textContent=''; }
function saveNote(){ var el=document.getElementById('notes'); if(el) localStorage.setItem(nkey(), el.value); }
function copyAllNotes(){ var out=[]; for(var v=0;v<VERS.length;v++) for(var i=0;i<BOOK.length;i++){ var n=(localStorage.getItem('hkm3_note_'+v+'_'+i)||'').trim(); if(n) out.push('=== ['+VERS[v].name+'] '+BOOK[i].label+' — '+BOOK[i].title+' ===\n'+n); }
  if(!out.length){ alert('No notes yet.'); return; } var t=out.join('\n\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){alert('All notes copied. Paste back to Claude.');},function(){prompt('Copy:',t);}); } else prompt('Copy:',t); }

function loadVoices(){ voices=(speechSynthesis.getVoices()||[]).filter(function(v){return /en[-_]/i.test(v.lang);}); if(!voices.length)voices=speechSynthesis.getVoices()||[];
  var sel=document.getElementById('voiceSel'); sel.innerHTML=''; voices.forEach(function(v,i){ var o=document.createElement('option'); o.value=i; o.textContent=v.name.replace(/Microsoft|Google/g,'').trim()+' ('+v.lang+')'; sel.appendChild(o); });
  var saved=localStorage.getItem('hkm3_voice'); if(saved!==null&&voices[saved]){ sel.value=saved; voice=voices[saved]; } else if(voices[0]) voice=voices[0]; }

document.getElementById('btnPlay').onclick=togglePlay;
document.getElementById('btnStop').onclick=function(){ stop(); si=0; hi(); };
document.getElementById('btnPrev').onclick=function(){ if(si>0)si--; if(playing)speak(); else hi(); };
document.getElementById('btnNext').onclick=function(){ if(si<sents.length-1)si++; if(playing)speak(); else hi(); };
document.getElementById('btnSpd').onclick=function(){ ri=(ri+1)%RATES.length; this.innerHTML=RATES[ri]+'&times;'; if(playing)speak(); };
document.getElementById('pbar').onclick=function(e){ if(!sents.length)return; var r=this.getBoundingClientRect(); si=Math.min(sents.length-1,Math.max(0,Math.floor((e.clientX-r.left)/r.width*sents.length))); if(playing)speak(); else hi(); };
document.getElementById('voiceSel').onchange=function(){ voice=voices[this.value]; localStorage.setItem('hkm3_voice',this.value); if(playing)speak(); };
document.getElementById('notes').oninput=function(){ localStorage.setItem(nkey(),this.value); var s=document.getElementById('sv'); s.textContent='saved ✓'; clearTimeout(window._t); window._t=setTimeout(function(){s.textContent='';},1200); };
document.getElementById('pgPrev').onclick=function(){ pg(-1); };
document.getElementById('pgNext').onclick=function(){ pg(1); };
window.addEventListener('beforeunload',function(){ saveNote(); stop(); });
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

(function(){ if(idx>=BOOK.length)idx=0; applyTheme(); loadVoices(); buildTabs(); buildTOC(); updateStat(); renderPiece(); loadNote(); })();
</script>
</body>
</html>
