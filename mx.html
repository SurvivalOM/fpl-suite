<style>
:root{--navy:#1B2C54;--gold:#C6A249;--bg:#f6f6f4;--card:#fff;--line:rgba(0,0,0,.10);--line2:rgba(0,0,0,.20);--tx:#1d1d1f;--mut:#6b6b6b;--mut2:#9a9a98;--vata:#E7E9F5;--kapha:#E9F0E3;--pitta:#F7EFDD}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
.wrap{max-width:1000px;margin:0 auto;padding:14px}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;border-radius:9px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.brand h1{font-size:17px;margin:0;font-weight:600}
.brand .sub{font-size:12px;color:var(--mut)}
.days{display:flex;gap:6px;flex-wrap:wrap}
.day-btn{border:1px solid var(--line2);background:var(--card);border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--tx)}
.day-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.tabs{display:flex;gap:3px;border-bottom:1px solid var(--line);margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.layout{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}
@media(max-width:720px){.layout{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.card h3{font-size:13px;margin:0 0 10px;color:var(--mut);font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn{border:1px solid var(--line2);background:var(--card);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--tx)}
.btn:hover{background:#f0f0ee}
.btn-p{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-p:hover{background:#24386b}
.grow{display:grid;grid-template-columns:84px 1fr;gap:4px;margin-bottom:3px}
.gt{font-size:10px;color:#444;border-radius:3px;padding:4px 5px;display:flex;align-items:center;justify-content:center;gap:4px;font-variant-numeric:tabular-nums}
.gt .d{font-size:9px;color:#888;font-weight:700}
.gcell{display:flex;border-radius:4px;overflow:hidden;min-height:27px;border:1px solid var(--line)}
.seg{display:flex;align-items:center;padding:0 7px;font-size:11px;white-space:nowrap;overflow:hidden;cursor:pointer;min-width:0;text-overflow:ellipsis}
.seg.blank{background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.045) 5px,rgba(0,0,0,.045) 10px)}
.leg{display:flex;flex-wrap:wrap;gap:6px 12px;font-size:11px;color:var(--mut)}
.leg span{display:flex;align-items:center;gap:5px}
.sw{width:11px;height:11px;border-radius:3px;border:1px solid var(--line)}
.stat{display:flex;align-items:baseline;gap:6px}
.stat .n{font-size:23px;font-weight:600}
.bar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-top:7px}
.fill{height:100%;border-radius:3px}
.lrow{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid var(--line);font-size:12px}
.lrow:last-child{border:none}
.tag{font-size:11px;background:#f0f0ee;border-radius:5px;padding:1px 7px;color:var(--mut)}
.del{color:#c0392b;cursor:pointer;font-size:11px;opacity:.55;margin-left:6px}
.del:hover{opacity:1}
.note{font-size:12px;color:var(--mut);line-height:1.7}
#grid{max-height:calc(100vh - 210px);overflow-y:auto;overflow-x:hidden}
#side{align-self:start;position:sticky;top:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:16px;z-index:9}
.ov.on{display:flex}
.modal{background:var(--card);border-radius:12px;padding:16px;width:340px;max-width:100%}
.modal h3{margin:0 0 12px;font-size:15px}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:11px;color:var(--mut);margin-bottom:3px}
.fld input,.fld select{width:100%;padding:7px 8px;border:1px solid var(--line2);border-radius:7px;font-size:13px;background:#fff;color:var(--tx)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mact{display:flex;justify-content:space-between;gap:8px;margin-top:14px}
</style>
</head>

function openAdd(dk,s,e,cat,label,which){editDay=dk;editIdx=null;editWhich=which||'actual';document.getElementById('mTitle').textContent=(editWhich==='plan'?'Plan block':editWhich==='perfect'?'Perfect block':'Add block');document.getElementById('mStart').value=s||'';document.getElementById('mEnd').value=e||'';document.getElementById('mCat').innerHTML=catOptions(cat||'money');document.getElementById('mLabel').value=label||'';document.getElementById('mDelete').style.display='none';document.getElementById('ov').classList.add('on');}
function openEdit(dk,i,which){editDay=dk;editIdx=i;editWhich=which||'actual';const b=DB.days[dk][editWhich==='actual'?'blocks':editWhich][i];document.getElementById('mTitle').textContent=(editWhich==='plan'?'Edit plan block':editWhich==='perfect'?'Edit perfect block':'Edit block');document.getElementById('mStart').value=b.s;document.getElementById('mEnd').value=b.e;document.getElementById('mCat').innerHTML=catOptions(b.cat);document.getElementById('mLabel').value=b.l;document.getElementById('mDelete').style.display='inline';document.getElementById('ov').classList.add('on');}
function closeModal(){document.getElementById('ov').classList.remove('on');}
function saveModal(){const s=document.getElementById('mStart').value,e=document.getElementById('mEnd').value,cat=document.getElementById('mCat').value,l=document.getElementById('mLabel').value;if(!s||!e){alert('Start and end times are needed.');return;}const blk={s:s,e:e,cat:cat,l:l};var dd=DB.days[editDay];var an=(editWhich==='actual'?'blocks':editWhich);dd[an]=dd[an]||[];if(editIdx===null)dd[an].push(blk);else dd[an][editIdx]=blk;dd[an].sort((a,b)=>toMin(a.s)-toMin(b.s));save();closeModal();renderMain();}
function delModal(){if(editIdx!==null){var an=(editWhich==='actual'?'blocks':editWhich);DB.days[editDay][an].splice(editIdx,1);save();}closeModal();renderMain();}
function addRound(){const j=day().japa=day().japa||{count:0,target:japaTargetFor(curDay)};const now=new Date();const hh=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');openAdd(curDay,hh,hh,'chant','R'+(j.count+1));}
function weekDays(anchor){var p=anchor.split('-');var end=new Date(+p[0],+p[1]-1,+p[2]);var out=[];for(var i=6;i>=0;i--){var x=new Date(end.getFullYear(),end.getMonth(),end.getDate()-i);out.push(x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2));}return out;}
function shortDate(k){var p=k.split('-'),mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[+p[1]-1]+' '+(+p[2]);}
function weekStat(lab,val,col){return '<div style="flex:1;min-width:118px;background:var(--card);border:1px solid var(--line);border-left:4px solid '+col+';border-radius:10px;padding:10px 12px"><div style="font-size:20px;font-weight:700;color:var(--navy)">'+val+'</div><div style="font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px">'+lab+'</div></div>';}
function renderWeekly(){var g=document.getElementById('grid');g.innerHTML='';var days=weekDays(curDay);var buckets={},proj={},total=0,rounds=0,logged=0;days.forEach(function(dk){var d=DB.days[dk];if(!d||!d.blocks||!d.blocks.length)return;logged++;var b=bkDayBuckets(dk);for(var k in b){buckets[k]=(buckets[k]||0)+b[k];total+=b[k];}var pj=bkDayProjects(dk);for(var pp in pj){proj[pp]=(proj[pp]||0)+pj[pp];}if(d.japa)rounds+=(d.japa.count||0);});var workMin=(buckets['Work']||0)+(buckets['Krishna consciousness']||0);var html='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap"><span style="font-weight:700;font-size:16px;color:var(--navy)">Week of '+shortDate(days[0])+' – '+shortDate(days[6])+'</span><span class="tag">'+logged+' day(s) logged</span></div>';html+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">'+weekStat('Working hours',bkHrs(workMin),'#6FB52E')+weekStat('Japa rounds',rounds+' / '+(18*7),'#15356E')+weekStat('Total tracked',bkHrs(total),'#9E9C94')+'</div>';var ord=Object.keys(buckets).sort(function(a,b){return buckets[b]-buckets[a];});html+='<div class="card" style="margin-bottom:12px"><h3>⏱ Time breakup · this week</h3>';if(!ord.length)html+='<div class="note">No time logged this week yet.</div>';ord.forEach(function(k){var pct=total?Math.round(buckets[k]/total*100):0,col=BK_COL[k]||'#9E9C94';html+='<div style="margin:6px 0"><div style="display:flex;justify-content:space-between;font-size:12.5px"><span>'+k+'</span><span style="color:var(--mut)">'+bkHrs(buckets[k])+' · '+pct+'%</span></div><div class="bar" style="height:7px;margin-top:2px"><div class="fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';});html+='</div>';var pord=Object.keys(proj).sort(function(a,b){return proj[b]-proj[a];});html+='<div class="card" style="margin-bottom:12px"><h3>📂 Projects we worked on</h3>';if(!pord.length)html+='<div class="note">No project work logged this week.</div>';pord.forEach(function(p){html+='<div class="lrow" style="font-size:13px"><span>'+p+'</span><span><b>'+bkHrs(proj[p])+'</b></span></div>';});html+='</div>';var projects=(DB.lists&&DB.lists.projects)||[];var done=projects.filter(function(p){return p.st==='done';}),wip=projects.filter(function(p){return (p.st||'wip')==='wip';});html+='<div class="card" style="margin-bottom:12px"><h3>✅ Completed &amp; in motion</h3><div style="font-size:11px;color:var(--mut);font-weight:600;margin:2px 0 4px">COMPLETED ('+done.length+')</div>';if(done.length)done.forEach(function(p){html+='<div class="lrow" style="font-size:13px"><span>✅ '+p.t+'</span></div>';});else html+='<div class="note">Mark projects done in Lists → Projects.</div>';html+='<div style="font-size:11px;color:var(--mut);font-weight:600;margin:10px 0 4px">IN MOTION ('+wip.length+')</div>';wip.forEach(function(p){html+='<div class="lrow" style="font-size:13px"><span>🔵 '+p.t+'</span></div>';});html+='</div>';var pfKey='mx-profit-'+days[0];var pf={};try{pf=JSON.parse(localStorage.getItem(pfKey))||{};}catch(e){}var dval=(pf.d!=null?pf.d:''),pval=(pf.p!=null?pf.p:'');html+='<div class="card" style="margin-bottom:12px"><h3>🎯 ProFit Score · professional fitness</h3><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px"><label style="font-size:12px;color:var(--mut)">DRIVERS /10<br><input type="number" min="1" max="10" id="wpfD" value="'+dval+'" style="width:72px;padding:6px;border:1px solid var(--line2);border-radius:6px;font-size:15px"></label><label style="font-size:12px;color:var(--mut)">PACKS /10<br><input type="number" min="1" max="10" id="wpfP" value="'+pval+'" style="width:72px;padding:6px;border:1px solid var(--line2);border-radius:6px;font-size:15px"></label><span id="wpfOut" style="font-size:14px;color:var(--navy);font-weight:700"></span></div><div style="font-size:11px;color:var(--mut)">Full 12-factor scoring + Profession Guide → <a href="profitscore.html" target="_blank" style="color:var(--navy);font-weight:600">Open ProFit Score ↗</a></div></div>';html+='<div class="card"><h3>📝 How was the week?</h3><textarea id="wkNote" placeholder="Wins · what slipped · the one correction for next week…" style="width:100%;min-height:72px;border:1px solid var(--line2);border-radius:8px;padding:9px;font:13.5px/1.5 inherit">'+((pf.note||'').replace(/</g,'&lt;'))+'</textarea></div>';g.innerHTML=html;function pfOut(){var dn=+document.getElementById('wpfD').value,pn=+document.getElementById('wpfP').value,out=document.getElementById('wpfOut');if(dn&&pn){out.textContent='D '+dn.toFixed(1)+' / P '+pn.toFixed(1)+' · floor: '+(dn<=pn?'DRIVERS':'PACKS');}else out.textContent='';}function pfSave(){var o={d:+document.getElementById('wpfD').value||null,p:+document.getElementById('wpfP').value||null,note:document.getElementById('wkNote').value};localStorage.setItem(pfKey,JSON.stringify(o));pfOut();}['wpfD','wpfP','wkNote'].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',pfSave);});pfOut();}
function renderModeSwitch(){const el=document.getElementById('modeSw');el.innerHTML='';[['day','Day'],['lists','Lists'],['weekly','Weekly']].forEach(m=>{const b=document.createElement('button');b.className='btn'+(mode===m[0]?' btn-p':'');b.textContent=m[1];b.style.padding='6px 14px';b.onclick=()=>{mode=m[0];render();};el.appendChild(b);});}
function render(){renderModeSwitch();var isAgg=(mode==='lists'||mode==='weekly');document.getElementById('tabs').style.display=isAgg?'none':'flex';document.getElementById('days').style.display=isAgg?'none':'flex';document.getElementById('side').style.display=isAgg?'none':'';document.getElementById('dayHead').style.display=isAgg?'none':'flex';document.getElementById('legend').style.display=isAgg?'none':'flex';document.querySelector('.layout').style.display=isAgg?'block':'grid';if(mode==='lists')renderLists();else if(mode==='weekly')renderWeekly();else{renderMain();renderSide();}}
function renderLists(){const g=document.getElementById('grid');g.innerHTML='';DB.locks=DB.locks||{};const NAMES={todo:'To-do',buying:'Buying',rsp:'RSP',exp:'Expenses'};if(!curList){const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px';[['todo','To-do'],['buying','Buying'],['rsp','RSP'],['projects','Projects'],['exp','Expenses']].forEach(L=>{const card=document.createElement('div');card.style.cssText='background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;min-height:130px';card.onclick=()=>{curList=L[0];listView=(L[0]==='exp')?'exp':'raw';renderLists();};let h='<div style="font-weight:600;color:var(--navy);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'+L[1]+(DB.locks[L[0]]?' <span style="font-size:11px">🔒</span>':'')+'</div>';if(L[0]==='exp'){h+='<div class="note">tap to see all expenses</div>';}else{const arr=DB.lists[L[0]]||[];arr.slice(0,6).forEach(it=>{h+='<div style="font-size:12px;padding:2px 0">• '+it.t+'</div>';});if(arr.length>6)h+='<div style="font-size:11px;color:var(--mut);margin-top:4px">+'+(arr.length-6)+' more…</div>';if(!arr.length)h+='<div class="note">empty — tap to add</div>';}card.innerHTML=h;grid.appendChild(card);});g.appendChild(grid);return;}const back=document.createElement('div');back.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:12px';const bb=document.createElement('button');bb.className='btn';bb.textContent='← all lists';bb.onclick=()=>{curList='';renderLists();};const ti=document.createElement('span');ti.style.cssText='font-weight:600;font-size:15px;color:var(--navy)';ti.textContent=NAMES[curList];back.appendChild(bb);back.appendChild(ti);g.appendChild(back);if(curList==='exp'){renderExpenses(g);return;}if(curList==='projects'){renderProjects(g);return;}const vt=document.createElement('div');vt.style.cssText='display:flex;gap:3px;border-bottom:1px solid var(--line);margin-bottom:12px';[['raw','Raw'],['matrix','Matrix'],['priority','Priority']].forEach(v=>{const d=document.createElement('div');d.className='tab'+(listView===v[0]?' on':'');d.textContent=v[1];d.style.cursor='pointer';d.onclick=()=>{listView=v[0];renderLists();};vt.appendChild(d);});g.appendChild(vt);const arr=DB.lists[curList]||(DB.lists[curList]=[]);if(listView==='raw')renderRaw(g,arr);else if(listView==='matrix')renderMatrix(g,arr);else renderPriority(g,arr);}
function renderRaw(g,arr){const add=document.createElement('div');add.style.cssText='display:flex;gap:6px;margin-bottom:10px';const inp=document.createElement('input');inp.placeholder='add an item…';inp.style.cssText='flex:1;padding:7px 9px;border:1px solid var(--line2);border-radius:7px;font-size:13px';const ab=document.createElement('button');ab.className='btn btn-p';ab.textContent='add';ab.onclick=()=>{if(inp.value.trim()){arr.push({t:inp.value.trim(),u:false,i:false});inp.value='';renderLists();}};inp.onkeydown=e=>{if(e.key==='Enter')ab.onclick();};add.appendChild(inp);add.appendChild(ab);g.appendChild(add);arr.forEach((it,idx)=>{const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)';const tx=document.createElement('span');tx.style.cssText='flex:1;font-size:13px';tx.textContent=it.t;const ub=document.createElement('button');ub.className='btn';ub.textContent='Urgent';ub.style.cssText='padding:3px 8px;font-size:11px'+(it.u?';background:#D8342F;color:#fff;border-color:#D8342F':'');ub.onclick=()=>{it.u=!it.u;renderLists();};const ib=document.createElement('button');ib.className='btn';ib.textContent='Important';ib.style.cssText='padding:3px 8px;font-size:11px'+(it.i?';background:#1B2C54;color:#fff;border-color:#1B2C54':'');ib.onclick=()=>{it.i=!it.i;renderLists();};const db=document.createElement('span');db.className='del';db.textContent='✕';db.onclick=()=>{arr.splice(idx,1);renderLists();};row.appendChild(tx);row.appendChild(ub);row.appendChild(ib);row.appendChild(db);g.appendChild(row);});}
function renderMatrix(g,arr){DB.locks=DB.locks||{};const locked=!!DB.locks[curList];const top=document.createElement('div');top.style.cssText='display:flex;justify-content:flex-end;margin-bottom:8px';const lb=document.createElement('button');lb.className='btn'+(locked?' btn-p':'');lb.textContent=locked?'🔒 locked — tap to unlock':'lock priorities';lb.onclick=()=>{if(locked){DB.locks[curList]=false;}else{const rk=it=>it.u&&it.i?0:(it.i?1:(it.u?2:3));DB.lists[curList]=arr.slice().sort((a,b)=>rk(a)-rk(b));DB.locks[curList]=true;}renderLists();};top.appendChild(lb);g.appendChild(top);const q=[{t:'Do first',d:'urgent + important',f:it=>it.u&&it.i,c:'#D8342F'},{t:'Schedule',d:'important, not urgent',f:it=>!it.u&&it.i,c:'#1B2C54'},{t:'Delegate',d:'urgent, not important',f:it=>it.u&&!it.i,c:'#BA7517'},{t:'Later / drop',d:'neither',f:it=>!it.u&&!it.i,c:'#777'}];const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';q.forEach(Q=>{const cell=document.createElement('div');cell.style.cssText='border:1px solid var(--line2);border-radius:8px;padding:10px;min-height:90px';cell.innerHTML='<div style="font-weight:600;font-size:12px;color:'+Q.c+'">'+Q.t+'</div><div style="font-size:10px;color:var(--mut);margin-bottom:6px">'+Q.d+'</div>';arr.forEach(it=>{if(Q.f(it)){const t=document.createElement('div');t.textContent=it.t;t.title=locked?'locked':'click to move to next quadrant';t.style.cssText='font-size:12px;padding:4px 7px;background:var(--bg);border:1px solid var(--line);border-radius:5px;margin-bottom:5px;cursor:'+(locked?'default':'pointer');if(!locked)t.onclick=()=>{if(it.u&&it.i){it.u=false;}else if(!it.u&&it.i){it.u=true;it.i=false;}else if(it.u&&!it.i){it.u=false;}else{it.u=true;it.i=true;}renderLists();};cell.appendChild(t);}});grid.appendChild(cell);});g.appendChild(grid);const note=document.createElement('div');note.className='note';note.style.marginTop='10px';note.innerHTML=locked?'🔒 Priorities locked — the Priority tab is frozen to this. Unlock to rearrange.':'Click a task to move it, or ask me to prioritise. Tap <b>lock priorities</b> (top-right) when happy — the Priority tab freezes to that.';g.appendChild(note);}
function renderPriority(g,arr){DB.locks=DB.locks||{};const locked=!!DB.locks[curList];if(!arr.length){const n=document.createElement('div');n.className='note';n.textContent='List is empty.';g.appendChild(n);return;}const rank=it=>it.u&&it.i?0:(it.i?1:(it.u?2:3));const names=['Do first','Schedule','Delegate','Later'];const list=locked?arr:arr.slice().sort((a,b)=>rank(a)-rank(b));if(locked){const n=document.createElement('div');n.className='note';n.style.marginBottom='8px';n.innerHTML='🔒 Locked priority order — finalise of the day.';g.appendChild(n);}let n=0;list.forEach(it=>{n++;const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)';row.innerHTML='<span style="font-weight:600;color:var(--navy);width:22px">'+n+'</span><span style="flex:1;font-size:13px">'+it.t+'</span><span class="tag">'+names[rank(it)]+'</span>';g.appendChild(row);});}
function renderExpenses(g){let out=0,inc=0;const rows=document.createElement('div');Object.keys(DB.days).sort().forEach(dk=>{(DB.days[dk].expenses||[]).forEach(e=>{if(e.dir==='in')inc+=e.amt;else out+=e.amt;const r=document.createElement('div');r.className='lrow';r.innerHTML='<span>'+dlabel(dk)+' · '+e.name+'</span><span>'+(e.dir==='in'?'+':'')+'₹'+e.amt.toLocaleString('en-IN')+'</span>';rows.appendChild(r);});});const tot=document.createElement('div');tot.className='lrow';tot.style.cssText='font-weight:600;border-bottom:2px solid var(--line2);margin-bottom:6px';tot.innerHTML='<span>Total out / in</span><span>₹'+out.toLocaleString('en-IN')+' / ₹'+inc.toLocaleString('en-IN')+'</span>';g.appendChild(tot);if(rows.children.length)g.appendChild(rows);else{const n=document.createElement('div');n.className='note';n.textContent='No expenses logged yet.';g.appendChild(n);}}
function renderProjects(g){var arr=DB.lists.projects||(DB.lists.projects=[]);var add=document.createElement('div');add.style.cssText='display:flex;gap:6px;margin-bottom:10px';var inp=document.createElement('input');inp.placeholder='add a project…';inp.style.cssText='flex:1;padding:7px 9px;border:1px solid var(--line2);border-radius:7px;font-size:13px';var ab=document.createElement('button');ab.className='btn btn-p';ab.textContent='add';ab.onclick=function(){if(inp.value.trim()){arr.push({t:inp.value.trim(),st:'wip'});inp.value='';renderLists();}};inp.onkeydown=function(e){if(e.key==='Enter')ab.onclick();};add.appendChild(inp);add.appendChild(ab);g.appendChild(add);var icon={done:'✅',wip:'🔵',plan:'⚪'};var lbl={done:'completed',wip:'in progress',plan:'to do'};['wip','plan','done'].forEach(function(st){var grp=arr.filter(function(p){return (p.st||'wip')===st;});if(!grp.length)return;var hh=document.createElement('div');hh.style.cssText='font-size:11px;color:var(--mut);font-weight:600;margin:10px 0 4px;text-transform:uppercase';hh.textContent=lbl[st]+' ('+grp.length+')';g.appendChild(hh);grp.forEach(function(p){var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line)';var b=document.createElement('span');b.style.cssText='cursor:pointer;font-size:14px';b.textContent=icon[p.st||'wip'];b.title='click to change status';b.onclick=function(){p.st=(p.st==='wip'?'done':(p.st==='done'?'plan':'wip'));save();renderLists();};var tx=document.createElement('span');tx.style.cssText='flex:1;font-size:13px'+(st==='done'?';color:var(--mut)':'');tx.textContent=p.t;var del=document.createElement('span');del.className='del';del.textContent='✕';del.onclick=function(){arr.splice(arr.indexOf(p),1);save();renderLists();};row.appendChild(b);row.appendChild(tx);row.appendChild(del);g.appendChild(row);});});}
function renderAll(){renderDays();render();scrollToday();}
function activateDay(dk){activeDay=dk;curDay=dk;document.querySelectorAll('[id^="day-"]').forEach(s=>{s.style.boxShadow='none';s.style.background='transparent';});var sec=document.getElementById('day-'+dk);if(sec){sec.style.boxShadow='0 0 0 2px var(--gold)';sec.style.background='rgba(198,162,73,.06)';}renderDays();renderSide();}
document.getElementById('addBlock').onclick=()=>openAdd(curDay,'','','money','');
document.getElementById('addRound').onclick=addRound;
document.getElementById('mCancel').onclick=closeModal;
document.getElementById('mSave').onclick=saveModal;
document.getElementById('mDelete').onclick=delModal;
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')closeModal();};
['wheel','touchmove'].forEach(ev=>document.getElementById('grid').addEventListener(ev,()=>{if(activeDay){var s=document.getElementById('day-'+activeDay);if(s){s.style.boxShadow='none';s.style.background='transparent';}activeDay=null;}},{passive:true}));
(function(){var dg=false,sM=0,cM=0,dDk=null,dW=null,mv=false,sw=false;
var tip=document.createElement('div');tip.style.cssText='position:fixed;z-index:9999;background:#15356E;color:#fff;font-size:12px;font-weight:600;padding:4px 9px;border-radius:6px;pointer-events:none;display:none;box-shadow:0 4px 12px rgba(0,0,0,.3)';document.body.appendChild(tip);
function wrapAt(x,y){var el=document.elementFromPoint(x,y);return el&&el.closest?el.closest('.mxdrag'):null;}
function minAt(w,x){var r=w.getBoundingClientRect();var f=Math.max(0,Math.min(1,(x-r.left)/r.width));return Math.min(1439,(+w.dataset.h)*60+Math.round(f*60));}
document.addEventListener('mousedown',function(e){sw=false;var w=e.target&&e.target.closest?e.target.closest('.mxdrag'):null;if(!w)return;dg=true;mv=false;dDk=w.dataset.dk;dW=w.dataset.which;sM=minAt(w,e.clientX);cM=sM;document.body.style.userSelect='none';});
document.addEventListener('mousemove',function(e){if(!dg)return;var w=wrapAt(e.clientX,e.clientY);if(w&&w.dataset.dk===dDk)cM=minAt(w,e.clientX);if(Math.abs(cM-sM)>=2)mv=true;if(mv){var a=Math.min(sM,cM),b=Math.max(sM,cM);tip.textContent=minToStr(a)+' – '+minToStr(b);tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+14)+'px';tip.style.display='block';}});
document.addEventListener('mouseup',function(e){document.body.style.userSelect='';if(!dg)return;dg=false;tip.style.display='none';if(mv){var a=Math.min(sM,cM),b=Math.max(sM,cM);if(b-a<1)b=a+1;sw=true;setTimeout(function(){sw=false;},60);openAdd(dDk,minToStr(a),minToStr(b),'','',dW);}});
document.addEventListener('click',function(e){if(sw){sw=false;e.stopPropagation();e.preventDefault();}},true);
})();
renderAll();
</script>
